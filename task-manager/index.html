        }

        async function smartSync() {
            if (!isOnline || !currentUserId) return;

            try {
                const response = await fetch(`${JSONBIN_API_URL}/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_SECRET_KEY
                    }
                });

                if (response.status === 404) {
                    await saveToCloud();
                    alert('同步成功！本地数据已上传到云端');
                    return;
                }

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const data = await response.json();
                const cloudData = data.record;

                if (!cloudData || !cloudData.users || !cloudData.users[currentUserId]) {
                    await saveToCloud();
                    alert('同步成功！本地数据已上传到云端');
                    return;
                }

                const userData = cloudData.users[currentUserId];
                const cloudUpdatedAt = userData.updatedAt || '1970-01-01T00:00:00Z';
                const localUpdatedAt = getLocalUpdatedAt();

                console.log('云端更新时间:', cloudUpdatedAt);
                console.log('本地更新时间:', localUpdatedAt);

                const cloudTime = new Date(cloudUpdatedAt).getTime();
                const localTime = new Date(localUpdatedAt).getTime();

                if (cloudTime > localTime) {
                    // 云端数据更新，加载到本地
                    tasks = userData.tasks || [];
                    categories = userData.categories || ['工作', '生活', '学习', '其他'];
                    saveToStorage();
                    renderTasks();
                    updateCategoryFilter();
                    alert('同步成功！已从云端更新数据');
                } else if (localTime > cloudTime) {
                    // 本地数据更新，保存到云端
                    await saveToCloud();
                    alert('同步成功！本地数据已上传到云端');
                } else {
                    alert('数据已是最新，无需同步');
                }
            } catch (error) {
                console.error('同步失败:', error);
                alert('同步失败，请稍后重试');
            }
        }

        function getLocalUpdatedAt() {
            if (tasks.length === 0) {
                return '1970-01-01T00:00:00Z';
            }
            
            let latestTime = '1970-01-01T00:00:00Z';
            tasks.forEach(task => {
                if (task.updated_at) {
                    const taskTime = new Date(task.updated_at).getTime();
                    const latest = new Date(latestTime).getTime();
                    if (taskTime > latest) {
                        latestTime = task.updated_at;
                    }
                }
            });
            
            return latestTime;
        }

        // ========================================
        // 原有功能
        // ========================================
        
        const STATUS = { TODO: '待办', IN_PROGRESS: '进行中', COMPLETED: '已完成' };
        const PRIORITY = { HIGH: '高', MEDIUM: '中', LOW: '低' };
        const PRIORITY_ORDER = { [PRIORITY.HIGH]: 1, [PRIORITY.MEDIUM]: 2, [PRIORITY.LOW]: 3 };

        let tasks = [];
        let categories = ['工作', '生活', '学习', '其他'];
        let prioritySortDirection = null;
        let categorySortDirection = null;
        let dueDateSortDirection = null;
        let importMode = 'add';
        
        document.addEventListener('DOMContentLoaded', () => {
            isOnline = navigator.onLine;
            
            // 加载离线队列
            loadOfflineQueue();
            
            // 先加载本地数据作为默认值
            loadFromStorage();
            
            // 检查是否已登录
            const savedUserId = getUserId();
            
            if (savedUserId) {
                // 已登录，加载云端数据
                currentUserId = savedUserId;
                updateUserDisplay();
                
                if (isOnline) {
                    setTimeout(() => {
                        loadFromCloud();
                    }, 500);
                }
            }
            
            // 如果有离线队列且在线，自动处理
            if (isOnline && currentUserId && offlineQueue.length > 0) {
                setTimeout(() => {
                    processOfflineQueue();
                }, 2000);
            }
            
            // 初始化任务
            tasks.forEach(task => {
                if (task.status === STATUS.COMPLETED && !task.completed_at) {
                    task.completed_at = task.updated_at || task.created_at || new Date().toISOString();
                }
            });
            saveToStorage();
            renderTasks();
            updateCategoryFilter();
            initTheme();
            initColumnResize();
            lucide.createIcons();
        });
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                lucide.createIcons();
            });
        }
        
        let columnResizing = null;
        let resizeStartX = 0;
        let resizeStartWidth = 0;
        
        function initColumnResize() {
            document.addEventListener('mousemove', (e) => {
                if (!columnResizing) return;
                const diff = e.pageX - resizeStartX;
                const newWidth = Math.max(50, resizeStartWidth + diff);
                columnResizing.style.width = newWidth + 'px';
            });
            
            document.addEventListener('mouseup', () => {
                if (columnResizing) {
                    columnResizing = null;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
            
            bindColumnResize();
        }
        
        function bindColumnResize() {
            const table = document.getElementById('taskTable');
            if (!table) return;
            
            const headers = table.querySelectorAll('th');
            headers.forEach((th, index) => {
                th.addEventListener('mousedown', (e) => {
                    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
                    
                    columnResizing = th;
                    resizeStartX = e.pageX;
                    resizeStartWidth = th.offsetWidth;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });
            });
        }

        function loadFromStorage() {
            try {
                const savedTasks = localStorage.getItem('tasks');
                const savedCategories = localStorage.getItem('categories');
                if (savedTasks) tasks = JSON.parse(savedTasks);
                if (savedCategories) categories = JSON.parse(savedCategories);
            } catch (e) {
                console.error('加载数据失败:', e);
                tasks = [];
                categories = ['工作', '生活', '学习', '其他'];
            }
        }

        function saveToStorage() {
            try {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('categories', JSON.stringify(categories));
            } catch (e) {
                console.error('保存数据失败:', e);
                alert('保存失败，可能是存储空间不足');
            }
        }

        function getFilteredTasks() {
            const statusFilter = document.getElementById('filterStatus').value;
            const priorityFilter = document.getElementById('filterPriority').value;
            const categoryFilter = document.getElementById('filterCategory').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            return tasks.filter(task => {
                if (statusFilter && task.status !== statusFilter) return false;
                if (priorityFilter && task.priority !== priorityFilter) return false;
                if (categoryFilter && task.category !== categoryFilter) return false;
                if (search && !task.title.toLowerCase().includes(search) && 
                    !task.description?.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function handleFilterChange(filterType) {
            const filterId = 'filter' + filterType.charAt(0).toUpperCase() + filterType.slice(1);
            const currentFilter = document.getElementById(filterId);
            const currentValue = currentFilter.value;
            
            if (currentValue) {
                if (filterType !== 'status') {
                    document.getElementById('filterStatus').value = '';
                }
                if (filterType !== 'priority') {
                    document.getElementById('filterPriority').value = '';
                }
                if (filterType !== 'category') {
                    document.getElementById('filterCategory').value = '';
                }
                
                prioritySortDirection = null;
                categorySortDirection = null;
                dueDateSortDirection = null;
                
                updateSortIndicator();
                updateCategorySortIndicator();
                updateDueDateSortIndicator();
            }
            
            renderTasks();
        }

        function sortTasks(taskList) {
            const pending = taskList.filter(t => t.status !== STATUS.COMPLETED);
            const completed = taskList.filter(t => t.status === STATUS.COMPLETED);

            pending.sort((a, b) => {
                let diff;
                
                if (categorySortDirection) {
                    const catA = a.category || '';
                    const catB = b.category || '';
                    diff = catA.localeCompare(catB, 'zh-CN');
                    if (diff !== 0) return categorySortDirection === 'asc' ? diff : -diff;
                }
                
                if (dueDateSortDirection) {
                    if (!a.due_date && !b.due_date) diff = 0;
                    else if (!a.due_date) diff = 1;
                    else if (!b.due_date) diff = -1;
                    else diff = new Date(a.due_date) - new Date(b.due_date);
                    if (diff !== 0) return dueDateSortDirection === 'asc' ? diff : -diff;
                }
                
                if (prioritySortDirection) {
                    diff = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
                    if (diff !== 0) return prioritySortDirection === 'desc' ? diff : -diff;
                }
                
                if (!a.due_date && !b.due_date) return 0;
                if (!a.due_date) return 1;
                if (!b.due_date) return -1;
                return new Date(a.due_date) - new Date(b.due_date);
            });

            completed.sort((a, b) => {
                const timeA = a.completed_at ? new Date(a.completed_at) : 0;
                const timeB = b.completed_at ? new Date(b.completed_at) : 0;
                return timeB - timeA;
            });

            return [...pending, ...completed];
        }

        function togglePrioritySort() {
            if (prioritySortDirection === null) {
                prioritySortDirection = 'desc';
            } else if (prioritySortDirection === 'desc') {
                prioritySortDirection = 'asc';
            } else {
                prioritySortDirection = null;
            }
            updateSortIndicator();
            renderTasks();
        }

        function toggleCategorySort() {
            if (categorySortDirection === null) {
                categorySortDirection = 'asc';
            } else if (categorySortDirection === 'asc') {
                categorySortDirection = 'desc';
            } else {
                categorySortDirection = null;
            }
            updateCategorySortIndicator();
            renderTasks();
        }

        function toggleDueDateSort() {
            if (dueDateSortDirection === null) {
                dueDateSortDirection = 'asc';
            } else if (dueDateSortDirection === 'asc') {
                dueDateSortDirection = 'desc';
            } else {
                dueDateSortDirection = null;
            }
            updateDueDateSortIndicator();
            renderTasks();
        }

        function updateSortIndicator() {
            const indicator = document.querySelector('.sort-indicator');
            if (indicator) {
                indicator.className = 'sort-indicator text-blue-500 ' + (prioritySortDirection || 'none');
            }
        }

        function updateCategorySortIndicator() {
            const indicator = document.querySelector('.sort-indicator-cat');
            if (indicator) {
                indicator.className = 'sort-indicator-cat text-blue-500 ' + (categorySortDirection || 'none');
            }
        }

        function updateDueDateSortIndicator() {
            const indicator = document.querySelector('.sort-indicator-date');
            if (indicator) {
                indicator.className = 'sort-indicator-date text-blue-500 ' + (dueDateSortDirection || 'none');
            }
        }

        function renderTasks() {
            const filtered = getFilteredTasks();
            const sorted = sortTasks(filtered);
            const tbody = document.getElementById('taskTableBody');
            const emptyState = document.getElementById('emptyState');
            const table = document.getElementById('taskTable');

            if (sorted.length === 0) {
                emptyState.classList.remove('hidden');
                table.classList.add('hidden');
                lucide.createIcons();
                return;
            }

            emptyState.classList.add('hidden');
            table.classList.remove('hidden');
            tbody.innerHTML = sorted.map(task => renderTaskRow(task)).join('');
            lucide.createIcons();
            bindColumnResize();
        }

        function renderTaskRow(task) {
            const isCompleted = task.status === STATUS.COMPLETED;
            const isOverdue = (task.status === STATUS.TODO || task.status === STATUS.IN_PROGRESS) && task.due_date && task.due_date < new Date().toLocaleDateString('sv-SE');
            const priorityClass = task.priority === PRIORITY.HIGH ? 'priority-high' :
                                 task.priority === PRIORITY.MEDIUM ? 'priority-medium' : 'priority-low';
            const priorityIcon = task.priority === PRIORITY.HIGH ? '🔴' : task.priority === PRIORITY.MEDIUM ? '🟡' : '🟢';

            return `
                <tr class="task-row ${isCompleted ? 'completed' : ''} ${isOverdue ? 'overdue' : ''} hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors" data-id="${task.id}">
                    <td class="px-3 py-3">
                        <input type="checkbox" class="task-checkbox" ${isCompleted ? 'checked' : ''}
                               onchange="toggleComplete(${task.id}, this.checked)">
                    </td>
                    <td class="px-4 py-3 text-slate-800 dark:text-slate-200 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'title')">
                        ${escapeHtml(task.title)}
                    </td>
                    <td class="px-4 py-3 text-slate-600 dark:text-slate-400 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'category')">
                        ${escapeHtml(task.category) || '-'}
                    </td>
                    <td class="px-4 py-3 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'status')">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs sm:text-sm font-medium ${
                            task.status === STATUS.TODO ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400' :
                            task.status === STATUS.IN_PROGRESS ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' :
                            'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'
                        }">${task.status}</span>
                    </td>
                    <td class="px-4 py-3 ${priorityClass} editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'priority')">
                        ${priorityIcon} ${task.priority}
                    </td>
                    <td class="px-4 py-3 text-slate-600 dark:text-slate-400 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'due_date')">
                        ${task.due_date || '-'}
                    </td>
                    <td class="px-4 py-3 text-slate-500 dark:text-slate-400 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600 truncate max-w-[200px]" onclick="enableEdit(this, ${task.id}, 'description')">
                        ${escapeHtml(task.description) || '-'}
                    </td>
                    <td class="px-3 py-3 text-center">
                        <button onclick="deleteTask(${task.id})" class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors cursor-pointer" title="删除任务">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `;
        }

        function enableEdit(td, taskId, field) {
            if (td.classList.contains('editing')) return;
            if (td.querySelector('input[type="checkbox"]')) return;

            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const currentValue = task[field] || '';
            td.classList.add('editing');
            td.classList.remove('hover:bg-slate-100', 'dark:hover:bg-slate-600');

            let input;
            if (field === 'status') {
                input = document.createElement('select');
                [STATUS.TODO, STATUS.IN_PROGRESS, STATUS.COMPLETED].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    if (opt === currentValue) option.selected = true;
                    input.appendChild(option);
                });
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
                input.addEventListener('change', () => {
                    const newValue = input.value;
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                });
            } else if (field === 'priority') {
                input = document.createElement('select');
                [PRIORITY.HIGH, PRIORITY.MEDIUM, PRIORITY.LOW].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    if (opt === currentValue) option.selected = true;
                    input.appendChild(option);
                });
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
                input.addEventListener('change', () => {
                    const newValue = input.value;
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                });
            } else if (field === 'category') {
                input = document.createElement('select');
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '(无)';
                input.appendChild(emptyOption);
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    if (cat === currentValue) option.selected = true;
                    input.appendChild(option);
                });
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
                input.addEventListener('change', () => {
                    const newValue = input.value;
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                });
            } else if (field === 'due_date') {
                input = document.createElement('input');
                input.type = 'date';
                input.value = currentValue;
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
            } else {
                input = document.createElement('input');
                input.type = 'text';
                input.value = currentValue;
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
            }

            td.innerHTML = '';
            td.appendChild(input);
            input.focus();
            input.select();

            let cancelled = false;

            input.addEventListener('blur', () => {
                if (!cancelled) {
                    const newValue = input.value.trim();
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                }
                if (e.key === 'Escape') {
                    cancelled = true;
                    renderTasks();
                }
            });
        }

        function updateTaskField(taskId, field, newValue) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            task[field] = newValue;
            task.updated_at = new Date().toISOString();

            if (field === 'status') {
                if (newValue === STATUS.COMPLETED) {
                    task.completed_at = new Date().toISOString();
                } else {
                    task.completed_at = null;
                }
            }

            saveToStorage();
            if (currentUserId) saveToCloud(true);
        }

        function toggleComplete(taskId, isChecked) {
            const newStatus = isChecked ? STATUS.COMPLETED : STATUS.IN_PROGRESS;
            updateTaskField(taskId, 'status', newStatus);
            renderTasks();
        }

        function deleteTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            if (confirm(`确定要删除任务「${task.title}」吗？此操作不可撤销。`)) {
                tasks = tasks.filter(t => t.id !== taskId);
                saveToStorage();
                if (currentUserId) saveToCloud(true);
                renderTasks();
            }
        }

        function openAddModal() {
            document.getElementById('addTaskForm').reset();
            updateNewTaskCategorySelect();
            document.getElementById('addTaskModal').classList.add('active');
            lucide.createIcons();
        }

        function closeAddModal() {
            document.getElementById('addTaskModal').classList.remove('active');
        }

        async function saveNewTask(event) {
            event.preventDefault();

            const newTask = {
                id: Date.now(),
                title: document.getElementById('newTaskTitle').value.trim(),
                description: document.getElementById('newTaskDescription').value.trim(),
                category: document.getElementById('newTaskCategory').value,
                status: STATUS.TODO,
                priority: document.getElementById('newTaskPriority').value,
                due_date: document.getElementById('newTaskDueDate').value,
                created_at: new Date().toISOString().split('T')[0],
                updated_at: new Date().toISOString()
            };

            tasks.push(newTask);
            saveToStorage();
            renderTasks();
            closeAddModal();

            if (currentUserId) {
                await saveToCloud();
            }
        }

        function updateNewTaskCategorySelect() {
            const select = document.getElementById('newTaskCategory');
            select.innerHTML = '<option value="">(无)</option>' + 
                categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function openExportModal() {
            if (tasks.length === 0) {
                alert('暂无任务可导出');
                return;
            }
            document.getElementById('exportModal').classList.add('active');
            lucide.createIcons();
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('active');
        }

        function exportToCSV() {
            const headers = ['id', 'title', 'description', 'category', 'status', 'priority', 'due_date', 'created_at', 'updated_at', 'completed_at'];
            const csvContent = [
                headers.join(','),
                ...tasks.map(task => headers.map(h => {
                    const value = String(task[h] || '');
                    if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                        return `"${value.replace(/"/g, '""')}"`;
                    }
                    return value;
                }).join(','))
            ].join('\n');

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tasks_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            closeExportModal();
        }

        function exportToMD() {
            const date = new Date().toISOString().split('T')[0];
            const headers = ['ID', '标题', '描述', '分类', '状态', '优先级', '截止时间', '创建时间', '更新时间', '完成时间'];
            let mdContent = `# 任务列表\n\n`;
            mdContent += `> 导出时间: ${date} | 总计: ${tasks.length} 个任务\n\n`;
            mdContent += `| ${headers.join(' | ')} |\n`;
            mdContent += `| ${headers.map(() => '---').join(' | ')} |\n`;
            
            tasks.forEach(task => {
                const row = [
                    task.id || '',
                    escapeMd(task.title) || '',
                    escapeMd(task.description) || '',
                    task.category || '',
                    task.status || '',
                    task.priority || '',
                    task.due_date || '',
                    task.created_at || '',
                    task.updated_at ? task.updated_at.split('T')[0] : '',
                    task.completed_at ? task.completed_at.split('T')[0] : ''
                ];
                mdContent += `| ${row.join(' | ')} |\n`;
            });

            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tasks_${date}.md`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            closeExportModal();
        }

        function escapeMd(text) {
            if (!text) return '';
            return text.replace(/([*_`~\[\]()#+\-.!|])/g, '\\$1');
        }

        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
            lucide.createIcons();
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
        }

        function selectImportFile(format, mode) {
            importMode = mode;
            const fileInput = document.getElementById('fileInput');
            fileInput.accept = '.csv,.md,.markdown,.txt';
            fileInput.click();
            closeImportModal();
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const ext = file.name.toLowerCase().split('.').pop();
            const isCSV = ext === 'csv';

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                if (isCSV || content.includes(',')) {
                    importFromCSV(content);
                } else {
                    importFromMD(content);
                }
            };
            reader.readAsText(file, 'UTF-8');
            event.target.value = '';
        }

        function importFromCSV(content) {
            if (importMode === 'replace') {
                if (!confirm('确定要清空现有任务并导入新任务吗？此操作不可撤销。')) {
                    return;
                }
                tasks = [];
            }

            const lines = content.split('\n').filter(line => line.trim());

            if (lines.length < 2) {
                alert('CSV文件格式不正确');
                return;
            }

            const headers = parseCSVLine(lines[0]);
            const taskObjs = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length >= headers.length) {
                    const task = {};
                    headers.forEach((h, idx) => {
                        task[h.trim()] = values[idx]?.trim() || '';
                    });

                    if (task.title) {
                        const taskObj = {
                            id: task.id ? parseInt(task.id) : Date.now() + i,
                            title: task.title,
                            description: task.description || '',
                            category: task.category || '',
                            status: task.status || STATUS.TODO,
                            priority: task.priority || PRIORITY.MEDIUM,
                            due_date: task.due_date || '',
                            created_at: task.created_at || new Date().toISOString().split('T')[0],
                            updated_at: task.updated_at || new Date().toISOString()
                        };

                        if (task.completed_at) {
                            taskObj.completed_at = task.completed_at;
                        } else if (taskObj.status === STATUS.COMPLETED) {
                            taskObj.completed_at = taskObj.created_at;
                        }

                        if (importMode === 'replace' || !tasks.find(t => t.id === taskObj.id)) {
                            taskObjs.push(taskObj);
                        }
                    }
                }
            }

            if (taskObjs.length > 0) {
                tasks.push(...taskObjs);
                saveToStorage();
                renderTasks();
                alert(`成功导入 ${taskObjs.length} 个任务`);
            } else {
                alert('所有任务已存在，无新任务导入');
            }
        }

        function importFromMD(content) {
            if (importMode === 'replace') {
                if (!confirm('确定要清空现有任务并导入新任务吗？此操作不可撤销。')) {
                    return;
                }
                tasks = [];
            }

            const taskObjs = [];
            const lines = content.split('\n');

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                const taskMatch = line.match(/^- \[([ x])\]\s*(.+)$/);
                if (taskMatch) {
                    const isCompleted = taskMatch[1] === 'x';
                    const title = taskMatch[2].replace(/\*\*|~~|🔴|🟡|🟢|📁|📅|✅/g, '').trim();

                    const taskObj = {
                        id: Date.now() + taskObjs.length,
                        title: title,
                        description: '',
                        category: '',
                        status: isCompleted ? STATUS.COMPLETED : STATUS.TODO,
                        priority: PRIORITY.MEDIUM,
                        due_date: '',
                        created_at: new Date().toISOString().split('T')[0],
                        updated_at: new Date().toISOString()
                    };

                    if (isCompleted) {
                        taskObj.completed_at = new Date().toISOString();
                    }

                    const metaMatch = taskMatch[2].match(/📁([^📅✅🔴🟡🟢\s*]+)/);
                    if (metaMatch) taskObj.category = metaMatch[1];
                    
                    const dateMatch = taskMatch[2].match(/📅(\d{4}-\d{2}-\d{2})/);
                    if (dateMatch) taskObj.due_date = dateMatch[1];
                    
                    if (taskMatch[2].includes('🔴')) taskObj.priority = PRIORITY.HIGH;
                    else if (taskMatch[2].includes('🟡')) taskObj.priority = PRIORITY.MEDIUM;
                    else if (taskMatch[2].includes('🟢')) taskObj.priority = PRIORITY.LOW;

                    if (importMode === 'replace' || !tasks.find(t => t.id === taskObj.id)) {
                        taskObjs.push(taskObj);
                    }
                }
                
                const tabMatch = line.match(/^\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|/);
                if (tabMatch && tabMatch[2] && !line.includes('---') && !line.startsWith('#')) {
                    const title = tabMatch[2].trim();
                    if (title && title !== '标题') {
                        const taskObj = {
                            id: Date.now() + taskObjs.length,
                            title: title,
                            description: tabMatch[3]?.trim() || '',
                            category: tabMatch[4]?.trim() || '',
                            status: tabMatch[5]?.trim() || STATUS.TODO,
                            priority: tabMatch[6]?.trim() || PRIORITY.MEDIUM,
                            due_date: tabMatch[7]?.trim() || '',
                            created_at: tabMatch[8]?.trim() || new Date().toISOString().split('T')[0],
                            updated_at: new Date().toISOString()
                        };
                        
                        if (taskObj.status === '已完成') taskObj.status = STATUS.COMPLETED;
                        else if (taskObj.status === '进行中') taskObj.status = STATUS.IN_PROGRESS;
                        else taskObj.status = STATUS.TODO;
                        
                        if (taskObj.priority === '高') taskObj.priority = PRIORITY.HIGH;
                        else if (taskObj.priority === '中') taskObj.priority = PRIORITY.MEDIUM;
                        else if (taskObj.priority === '低') taskObj.priority = PRIORITY.LOW;
                        
                        if (title && importMode === 'replace' || !tasks.find(t => t.title === title)) {
                            taskObjs.push(taskObj);
                        }
                    }
                }
            }

            if (taskObjs.length > 0) {
                tasks.push(...taskObjs);
                saveToStorage();
                renderTasks();
                alert(`成功导入 ${taskObjs.length} 个任务`);
            } else if (taskObjs.length === 0 && content.trim()) {
                alert('未找到有效的任务列表项');
            } else {
                alert('所有任务已存在，无新任务导入');
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function updateCategoryFilter() {
            const select = document.getElementById('filterCategory');
            select.innerHTML = '<option value="">分类</option>' + 
                categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function openCategoryModal() {
            renderCategoryList();
            document.getElementById('categoryModal').classList.add('active');
            lucide.createIcons();
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');
        }

        function renderCategoryList() {
            const container = document.getElementById('categoryList');
            container.innerHTML = categories.map((cat, index) => `
                <div class="category-item flex items-center justify-between p-2 rounded-md">
                    <input type="text" value="${escapeHtml(cat)}" class="flex-1 px-2 py-1 bg-transparent border-none text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded" 
                        onchange="updateCategory(${index}, this.value)">
                    <button onclick="deleteCategory(${index})" class="ml-2 p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors cursor-pointer">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim();
            if (name && !categories.includes(name)) {
                categories.push(name);
                saveToStorage();
                if (currentUserId) saveToCloud(true);
                renderCategoryList();
                updateCategoryFilter();
                updateNewTaskCategorySelect();
                input.value = '';
            }
        }

        function updateCategory(index, newName) {
            const oldName = categories[index];
            categories[index] = newName;
            
            tasks.forEach(task => {
                if (task.category === oldName) {
                    task.category = newName;
                }
            });
            
            saveToStorage();
            if (currentUserId) saveToCloud(true);
            updateCategoryFilter();
            updateNewTaskCategorySelect();
            renderTasks();
        }

        function deleteCategory(index) {
            const name = categories[index];
            if (confirm(`确定要删除分类"${name}"吗？该分类下的任务将变为无分类。`)) {
                tasks.forEach(task => {
                    if (task.category === name) {
                        task.category = '';
                    }
                });
                
                categories.splice(index, 1);
                saveToStorage();
                if (currentUserId) saveToCloud(true);
                renderCategoryList();
                updateCategoryFilter();
                updateNewTaskCategorySelect();
                renderTasks();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
