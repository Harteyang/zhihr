<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - 知HR工具集</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fira Sans', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <style>
        html { scroll-behavior: smooth; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .dark .task-table tbody tr:hover { background: #334155; }
        .task-table tbody tr.completed { background: #e8f5e9; }
        .task-table tbody tr.completed td { color: #2e7d32; }
        .dark .task-table tbody tr.completed { background: #1b3d1e; }
        .dark .task-table tbody tr.completed td { color: #81c784; }
        .dark .task-table th { background: #1e293b; }
        
        .task-table th { position: relative; }
        .task-table th:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 8px;
            cursor: col-resize;
            border-right: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .task-table th:not(:last-child):hover::after {
            border-color: #94a3b8;
        }
        .dark .task-table th:not(:last-child):hover::after {
            border-color: #64748b;
        }
        
        .sort-indicator.asc::after { content: "↑"; }
        .sort-indicator.desc::after { content: "↓"; }
        .sort-indicator.none::after { content: ""; }
        
        .priority-high { color: #ef4444; }
        .priority-medium { color: #f97316; }
        .priority-low { color: #22c55e; }
        
        .task-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
        
        .dark .export-option:hover { border-color: #60a5fa; background: #334155; }
        .dark .category-item { background: #334155; }
        
        @media print {
            .no-print { display: none !important; }
        }
        
        @media (max-width: 768px) {
            .task-table { font-size: 12px; }
            .task-table th, .task-table td { padding: 8px 6px; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200 font-sans">

    <!-- 统一导航栏 -->
    <nav class="h-16 bg-white border-b border-slate-200 dark:bg-slate-800 dark:border-slate-700 px-4 md:px-6 lg:px-8 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.open('https://www.zhihr.vip', '_blank')">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 dark:text-blue-400">
                <circle cx="12" cy="5" r="1"/>
                <path d="m9 20 3-6 3 6"/>
                <path d="m6 8 6 2 6-2"/>
                <path d="M12 10v4"/>
            </svg>
            <div>
                <h1 class="text-lg font-semibold text-slate-800 dark:text-slate-100">知HR-任务管理</h1>
                <p class="text-xs text-slate-500 dark:text-slate-400 hidden sm:block">Vibe Coding，为HR制作效率工具</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="openImportModal()" class="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 dark:text-slate-300 dark:hover:bg-slate-700 rounded-md transition-colors duration-200 cursor-pointer" title="导入">
                <i data-lucide="download" class="w-4 h-4"></i>
            </button>
            <button onclick="openExportModal()" class="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 dark:text-slate-300 dark:hover:bg-slate-700 rounded-md transition-colors duration-200 cursor-pointer" title="导出">
                <i data-lucide="upload" class="w-4 h-4"></i>
            </button>
            <button id="themeToggle" class="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 dark:text-slate-300 dark:hover:bg-slate-700 rounded-md transition-colors duration-200 cursor-pointer" aria-label="切换主题">
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
            </button>
        </div>
    </nav>

    <!-- 主容器 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 pt-6 pb-10">
        
        <!-- 筛选栏 -->
        <div class="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm p-4 mb-5 no-print">
            <div class="flex flex-col md:flex-row md:items-center gap-4">
                <div class="flex flex-wrap items-center gap-3">
                    <button onclick="openAddModal()" class="px-3 py-1.5 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 transition-colors duration-200 cursor-pointer flex items-center gap-1.5" title="新建任务">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">新建</span>
                    </button>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 dark:text-slate-400">
                            共 <span id="taskCount" class="font-semibold text-blue-600 dark:text-blue-400">0</span> 个任务
                        </span>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-slate-600 dark:text-slate-400">状态:</label>
                        <select id="filterStatus" onchange="renderTasks()" class="px-3 py-1.5 border border-slate-300 dark:border-slate-600 rounded-md text-sm bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">全部</option>
                            <option value="待办">待办</option>
                            <option value="进行中">进行中</option>
                            <option value="已完成">已完成</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-sm text-slate-600 dark:text-slate-400">优先级:</label>
                        <select id="filterPriority" onchange="renderTasks()" class="px-3 py-1.5 border border-slate-300 dark:border-slate-600 rounded-md text-sm bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">全部</option>
                            <option value="高">高</option>
                            <option value="中">中</option>
                            <option value="低">低</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-sm text-slate-600 dark:text-slate-400">分类:</label>
                        <select id="filterCategory" onchange="renderTasks()" class="px-3 py-1.5 border border-slate-300 dark:border-slate-600 rounded-md text-sm bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">全部</option>
                        </select>
                        <button onclick="openCategoryModal()" class="p-1.5 text-slate-500 hover:text-blue-600 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-md transition-colors cursor-pointer" title="管理分类">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div class="flex-1">
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="searchInput" class="w-full md:w-64 pl-9 pr-4 py-1.5 border border-slate-300 dark:border-slate-600 rounded-md text-sm bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="搜索任务..." oninput="renderTasks()">
                    </div>
                </div>
            </div>
        </div>

        <!-- 任务表格 -->
        <div class="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden no-print">
            <div class="overflow-x-auto">
                <table class="task-table w-full border-collapse min-w-[900px]" id="taskTable">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-700/50">
                            <th class="w-12 px-3 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400"></th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400">标题</th>
                            <th class="w-24 px-4 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400">分类</th>
                            <th class="w-24 px-4 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400">状态</th>
                            <th class="w-28 px-4 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400 cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600 select-none" onclick="togglePrioritySort()">
                                优先级 <span class="sort-indicator none text-blue-500"></span>
                            </th>
                            <th class="w-32 px-4 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400">截止时间</th>
                            <th class="px-4 py-3 text-left text-sm font-semibold text-slate-600 dark:text-slate-400">描述</th>
                            <th class="w-12 px-3 py-3 text-center text-sm font-semibold text-slate-600 dark:text-slate-400"></th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody" class="divide-y divide-slate-200 dark:divide-slate-700">
                    </tbody>
                </table>
            </div>
            
            <!-- 空状态 -->
            <div id="emptyState" class="hidden text-center py-16">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-700 mb-4">
                    <i data-lucide="clipboard-list" class="w-8 h-8 text-slate-400"></i>
                </div>
                <h3 class="text-lg font-medium text-slate-700 dark:text-slate-300 mb-2">暂无任务</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">点击"新建任务"创建第一个任务</p>
                <button onclick="openAddModal()" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors duration-200 cursor-pointer inline-flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>新建任务</span>
                </button>
            </div>
        </div>
        
        <!-- 打印区域 -->
        <div id="printArea" class="hidden print:block">
            <h1 class="text-2xl font-bold mb-4">任务列表</h1>
            <p class="text-sm text-slate-500 mb-6">导出时间: <span id="exportDate"></span></p>
            <table class="w-full border-collapse" id="printTable">
            </table>
        </div>
    </main>

    <!-- 新建任务 Modal -->
    <div class="modal-overlay" id="addTaskModal">
        <div class="modal bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-xl p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100">新建任务</h2>
                <button onclick="closeAddModal()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="addTaskForm" onsubmit="saveNewTask(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">任务标题 *</label>
                    <input type="text" id="newTaskTitle" required placeholder="输入任务标题" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">任务描述</label>
                    <textarea id="newTaskDescription" placeholder="输入任务描述（可选）" rows="3" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">分类</label>
                        <select id="newTaskCategory" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">优先级</label>
                        <select id="newTaskPriority" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="高">高 🔴</option>
                            <option value="中" selected>中 🟡</option>
                            <option value="低">低 🟢</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">截止时间</label>
                    <input type="date" id="newTaskDueDate" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeAddModal()" class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-700 rounded-md hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors cursor-pointer">取消</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors cursor-pointer">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 导出 Modal -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-xl p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100">导出任务</h2>
                <button onclick="closeExportModal()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="space-y-3">
                <div onclick="exportToCSV()" class="flex items-center gap-4 p-4 border-2 border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer hover:border-blue-500 dark:hover:border-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700/50 transition-all">
                    <div class="flex items-center justify-center w-12 h-12 rounded-lg bg-green-100 dark:bg-green-900/30">
                        <i data-lucide="file-spreadsheet" class="w-6 h-6 text-green-600 dark:text-green-400"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium text-slate-800 dark:text-slate-100">导出为 CSV</div>
                        <div class="text-sm text-slate-500 dark:text-slate-400">可用 Excel、Numbers 等表格软件打开</div>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
                <div onclick="exportToMD()" class="flex items-center gap-4 p-4 border-2 border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer hover:border-blue-500 dark:hover:border-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700/50 transition-all">
                    <div class="flex items-center justify-center w-12 h-12 rounded-lg bg-purple-100 dark:bg-purple-900/30">
                        <i data-lucide="file-text" class="w-6 h-6 text-purple-600 dark:text-purple-400"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium text-slate-800 dark:text-slate-100">导出为 Markdown</div>
                        <div class="text-sm text-slate-500 dark:text-slate-400">Tab 分隔的纯文本格式，CSV 兼容</div>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 导入 Modal -->
    <div class="modal-overlay" id="importModal">
        <div class="modal bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-xl p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100">导入任务</h2>
                <button onclick="closeImportModal()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="space-y-3 mb-6">
                <div onclick="selectImportFile('csv', 'add')" class="flex items-center gap-4 p-4 border-2 border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer hover:border-blue-500 dark:hover:border-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700/50 transition-all">
                    <div class="flex items-center justify-center w-12 h-12 rounded-lg bg-green-100 dark:bg-green-900/30">
                        <i data-lucide="plus-circle" class="w-6 h-6 text-green-600 dark:text-green-400"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium text-slate-800 dark:text-slate-100">新增导入</div>
                        <div class="text-sm text-slate-500 dark:text-slate-400">追加不重复的任务</div>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
                <div onclick="selectImportFile('csv', 'replace')" class="flex items-center gap-4 p-4 border-2 border-slate-200 dark:border-slate-600 rounded-lg cursor-pointer hover:border-blue-500 dark:hover:border-blue-400 hover:bg-blue-50 dark:hover:bg-slate-700/50 transition-all">
                    <div class="flex items-center justify-center w-12 h-12 rounded-lg bg-red-100 dark:bg-red-900/30">
                        <i data-lucide="refresh-cw" class="w-6 h-6 text-red-600 dark:text-red-400"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium text-slate-800 dark:text-slate-100">覆盖导入</div>
                        <div class="text-sm text-slate-500 dark:text-slate-400">清空现有任务后导入</div>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400"></i>
                </div>
            </div>
            <div class="text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    支持 CSV 和 Markdown 格式文件
                </p>
            </div>
        </div>
    </div>

    <!-- 分类管理 Modal -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-xl p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-100">分类管理</h2>
                <button onclick="closeCategoryModal()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="categoryList" class="space-y-2 mb-4 max-h-64 overflow-y-auto">
            </div>
            <div class="flex gap-2">
                <input type="text" id="newCategoryInput" placeholder="输入新分类名称" class="flex-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500" onkeypress="if(event.key==='Enter'){event.preventDefault();addCategory();}">
                <button onclick="addCategory()" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors cursor-pointer">添加</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept=".csv,.md,.markdown,.txt" class="hidden" onchange="handleFileImport(event)">

    <script>
        lucide.createIcons();
        
        const STATUS = { TODO: '待办', IN_PROGRESS: '进行中', COMPLETED: '已完成' };
        const PRIORITY = { HIGH: '高', MEDIUM: '中', LOW: '低' };
        const PRIORITY_ORDER = { [PRIORITY.HIGH]: 1, [PRIORITY.MEDIUM]: 2, [PRIORITY.LOW]: 3 };

        let tasks = [];
        let categories = ['工作', '生活', '学习', '其他'];
        let prioritySortDirection = null;
        let importMode = 'add';
        
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            tasks.forEach(task => {
                if (task.status === STATUS.COMPLETED && !task.completed_at) {
                    task.completed_at = task.updated_at || task.created_at || new Date().toISOString();
                }
            });
            saveToStorage();
            renderTasks();
            updateCategoryFilter();
            initTheme();
            initColumnResize();
        });
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                lucide.createIcons();
            });
        }
        
        let columnResizing = null;
        let resizeStartX = 0;
        let resizeStartWidth = 0;
        
        function initColumnResize() {
            document.addEventListener('mousemove', (e) => {
                if (!columnResizing) return;
                const diff = e.pageX - resizeStartX;
                const newWidth = Math.max(50, resizeStartWidth + diff);
                columnResizing.style.width = newWidth + 'px';
            });
            
            document.addEventListener('mouseup', () => {
                if (columnResizing) {
                    columnResizing = null;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
            
            bindColumnResize();
        }
        
        function bindColumnResize() {
            const table = document.getElementById('taskTable');
            if (!table) return;
            
            const headers = table.querySelectorAll('th');
            headers.forEach((th, index) => {
                th.addEventListener('mousedown', (e) => {
                    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
                    
                    columnResizing = th;
                    resizeStartX = e.pageX;
                    resizeStartWidth = th.offsetWidth;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });
            });
        }

        function loadFromStorage() {
            try {
                const savedTasks = localStorage.getItem('tasks');
                const savedCategories = localStorage.getItem('categories');
                if (savedTasks) tasks = JSON.parse(savedTasks);
                if (savedCategories) categories = JSON.parse(savedCategories);
            } catch (e) {
                console.error('加载数据失败:', e);
                tasks = [];
                categories = ['工作', '生活', '学习', '其他'];
            }
        }

        function saveToStorage() {
            try {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('categories', JSON.stringify(categories));
            } catch (e) {
                console.error('保存数据失败:', e);
                alert('保存失败，可能是存储空间不足');
            }
        }

        function getFilteredTasks() {
            const statusFilter = document.getElementById('filterStatus').value;
            const priorityFilter = document.getElementById('filterPriority').value;
            const categoryFilter = document.getElementById('filterCategory').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            return tasks.filter(task => {
                if (statusFilter && task.status !== statusFilter) return false;
                if (priorityFilter && task.priority !== priorityFilter) return false;
                if (categoryFilter && task.category !== categoryFilter) return false;
                if (search && !task.title.toLowerCase().includes(search) && 
                    !task.description?.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function sortTasks(taskList) {
            const pending = taskList.filter(t => t.status !== STATUS.COMPLETED);
            const completed = taskList.filter(t => t.status === STATUS.COMPLETED);

            pending.sort((a, b) => {
                let diff;
                if (prioritySortDirection) {
                    diff = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
                    if (diff !== 0) return prioritySortDirection === 'desc' ? diff : -diff;
                }
                if (!a.due_date && !b.due_date) return 0;
                if (!a.due_date) return 1;
                if (!b.due_date) return -1;
                return new Date(a.due_date) - new Date(b.due_date);
            });

            completed.sort((a, b) => {
                const timeA = a.completed_at ? new Date(a.completed_at) : 0;
                const timeB = b.completed_at ? new Date(b.completed_at) : 0;
                return timeB - timeA;
            });

            return [...pending, ...completed];
        }

        function togglePrioritySort() {
            if (prioritySortDirection === null) {
                prioritySortDirection = 'desc';
            } else if (prioritySortDirection === 'desc') {
                prioritySortDirection = 'asc';
            } else {
                prioritySortDirection = null;
            }
            updateSortIndicator();
            renderTasks();
        }

        function updateSortIndicator() {
            const indicator = document.querySelector('.sort-indicator');
            indicator.className = 'sort-indicator ' + (prioritySortDirection || 'none');
        }

        function renderTasks() {
            const filtered = getFilteredTasks();
            const sorted = sortTasks(filtered);
            const tbody = document.getElementById('taskTableBody');
            const emptyState = document.getElementById('emptyState');
            const table = document.getElementById('taskTable');
            
            document.getElementById('taskCount').textContent = tasks.length;

            if (sorted.length === 0) {
                emptyState.classList.remove('hidden');
                table.classList.add('hidden');
                lucide.createIcons();
                return;
            }

            emptyState.classList.add('hidden');
            table.classList.remove('hidden');
            tbody.innerHTML = sorted.map(task => renderTaskRow(task)).join('');
            lucide.createIcons();
            bindColumnResize();
        }

        function renderTaskRow(task) {
            const isCompleted = task.status === STATUS.COMPLETED;
            const priorityClass = task.priority === PRIORITY.HIGH ? 'priority-high' :
                                 task.priority === PRIORITY.MEDIUM ? 'priority-medium' : 'priority-low';
            const priorityIcon = task.priority === PRIORITY.HIGH ? '🔴' : task.priority === PRIORITY.MEDIUM ? '🟡' : '🟢';

            return `
                <tr class="task-row ${isCompleted ? 'completed' : ''} hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors" data-id="${task.id}">
                    <td class="px-3 py-3">
                        <input type="checkbox" class="task-checkbox" ${isCompleted ? 'checked' : ''}
                               onchange="toggleComplete(${task.id}, this.checked)">
                    </td>
                    <td class="px-4 py-3 text-slate-800 dark:text-slate-200 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'title')">
                        ${escapeHtml(task.title)}
                    </td>
                    <td class="px-4 py-3 text-slate-600 dark:text-slate-400 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'category')">
                        ${escapeHtml(task.category) || '-'}
                    </td>
                    <td class="px-4 py-3 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'status')">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-sm font-medium ${
                            task.status === STATUS.TODO ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400' :
                            task.status === STATUS.IN_PROGRESS ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' :
                            'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'
                        }">${task.status}</span>
                    </td>
                    <td class="px-4 py-3 ${priorityClass} editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'priority')">
                        ${priorityIcon} ${task.priority}
                    </td>
                    <td class="px-4 py-3 text-slate-600 dark:text-slate-400 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600" onclick="enableEdit(this, ${task.id}, 'due_date')">
                        ${task.due_date || '-'}
                    </td>
                    <td class="px-4 py-3 text-slate-500 dark:text-slate-400 editable cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-600 truncate max-w-[200px]" onclick="enableEdit(this, ${task.id}, 'description')">
                        ${escapeHtml(task.description) || '-'}
                    </td>
                    <td class="px-3 py-3 text-center">
                        <button onclick="deleteTask(${task.id})" class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors cursor-pointer" title="删除任务">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `;
        }

        function enableEdit(td, taskId, field) {
            if (td.classList.contains('editing')) return;
            if (td.querySelector('input[type="checkbox"]')) return;

            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const currentValue = task[field] || '';
            td.classList.add('editing');
            td.classList.remove('hover:bg-slate-100', 'dark:hover:bg-slate-600');

            let input;
            if (field === 'status') {
                input = document.createElement('select');
                [STATUS.TODO, STATUS.IN_PROGRESS, STATUS.COMPLETED].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    if (opt === currentValue) option.selected = true;
                    input.appendChild(option);
                });
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
                input.addEventListener('change', () => {
                    const newValue = input.value;
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                });
            } else if (field === 'priority') {
                input = document.createElement('select');
                [PRIORITY.HIGH, PRIORITY.MEDIUM, PRIORITY.LOW].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    if (opt === currentValue) option.selected = true;
                    input.appendChild(option);
                });
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
                input.addEventListener('change', () => {
                    const newValue = input.value;
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                });
            } else if (field === 'category') {
                input = document.createElement('select');
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '(无)';
                input.appendChild(emptyOption);
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    if (cat === currentValue) option.selected = true;
                    input.appendChild(option);
                });
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
                input.addEventListener('change', () => {
                    const newValue = input.value;
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                });
            } else if (field === 'due_date') {
                input = document.createElement('input');
                input.type = 'date';
                input.value = currentValue;
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
            } else {
                input = document.createElement('input');
                input.type = 'text';
                input.value = currentValue;
                input.className = 'w-full px-2 py-1 border-2 border-blue-500 rounded bg-white dark:bg-slate-700 dark:text-slate-200';
            }

            td.innerHTML = '';
            td.appendChild(input);
            input.focus();
            input.select();

            let cancelled = false;

            input.addEventListener('blur', () => {
                if (!cancelled) {
                    const newValue = input.value.trim();
                    if (newValue !== currentValue) {
                        updateTaskField(taskId, field, newValue);
                    }
                    renderTasks();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                }
                if (e.key === 'Escape') {
                    cancelled = true;
                    renderTasks();
                }
            });
        }

        function updateTaskField(taskId, field, newValue) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            task[field] = newValue;
            task.updated_at = new Date().toISOString();

            if (field === 'status') {
                if (newValue === STATUS.COMPLETED) {
                    task.completed_at = new Date().toISOString();
                } else {
                    task.completed_at = null;
                }
            }

            saveToStorage();
        }

        function toggleComplete(taskId, isChecked) {
            const newStatus = isChecked ? STATUS.COMPLETED : STATUS.IN_PROGRESS;
            updateTaskField(taskId, 'status', newStatus);
            renderTasks();
        }

        function exportToCSV() {
            const headers = ['id', 'title', 'description', 'category', 'status', 'priority', 'due_date', 'created_at', 'updated_at', 'completed_at'];
            const csvContent = [
                headers.join(','),
                ...tasks.map(task => headers.map(h => {
                    const value = String(task[h] || '');
                    if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                        return `"${value.replace(/"/g, '""')}"`;
                    }
                    return value;
                }).join(','))
            ].join('\n');

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tasks_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            closeExportModal();
        }

        function exportToMD() {
            const date = new Date().toISOString().split('T')[0];
            const headers = ['ID', '标题', '描述', '分类', '状态', '优先级', '截止时间', '创建时间', '更新时间', '完成时间'];
            let mdContent = `# 任务列表\n\n`;
            mdContent += `> 导出时间: ${date} | 总计: ${tasks.length} 个任务\n\n`;
            mdContent += `| ${headers.join(' | ')} |\n`;
            mdContent += `| ${headers.map(() => '---').join(' | ')} |\n`;
            
            tasks.forEach(task => {
                const row = [
                    task.id || '',
                    escapeMd(task.title) || '',
                    escapeMd(task.description) || '',
                    task.category || '',
                    task.status || '',
                    task.priority || '',
                    task.due_date || '',
                    task.created_at || '',
                    task.updated_at ? task.updated_at.split('T')[0] : '',
                    task.completed_at ? task.completed_at.split('T')[0] : ''
                ];
                mdContent += `| ${row.join(' | ')} |\n`;
            });

            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tasks_${date}.md`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            closeExportModal();
        }

        function escapeMd(text) {
            if (!text) return '';
            return text.replace(/([*_`~\[\]()#+\-.!|])/g, '\\$1');
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const ext = file.name.toLowerCase().split('.').pop();
            const isCSV = ext === 'csv';

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                if (isCSV || content.includes(',')) {
                    importFromCSV(content);
                } else {
                    importFromMD(content);
                }
            };
            reader.readAsText(file, 'UTF-8');
            event.target.value = '';
        }

        function importFromCSV(content) {
            if (importMode === 'replace') {
                if (!confirm('确定要清空现有任务并导入新任务吗？此操作不可撤销。')) {
                    return;
                }
                tasks = [];
            }

            const lines = content.split('\n').filter(line => line.trim());

            if (lines.length < 2) {
                alert('CSV文件格式不正确');
                return;
            }

            const headers = parseCSVLine(lines[0]);
            const taskObjs = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length >= headers.length) {
                    const task = {};
                    headers.forEach((h, idx) => {
                        task[h.trim()] = values[idx]?.trim() || '';
                    });

                    if (task.title) {
                        const taskObj = {
                            id: task.id ? parseInt(task.id) : Date.now() + i,
                            title: task.title,
                            description: task.description || '',
                            category: task.category || '',
                            status: task.status || STATUS.TODO,
                            priority: task.priority || PRIORITY.MEDIUM,
                            due_date: task.due_date || '',
                            created_at: task.created_at || new Date().toISOString().split('T')[0],
                            updated_at: task.updated_at || new Date().toISOString()
                        };

                        if (task.completed_at) {
                            taskObj.completed_at = task.completed_at;
                        } else if (taskObj.status === STATUS.COMPLETED) {
                            taskObj.completed_at = taskObj.created_at;
                        }

                        if (importMode === 'replace' || !tasks.find(t => t.id === taskObj.id)) {
                            taskObjs.push(taskObj);
                        }
                    }
                }
            }

            if (taskObjs.length > 0) {
                tasks.push(...taskObjs);
                saveToStorage();
                renderTasks();
                alert(`成功导入 ${taskObjs.length} 个任务`);
            } else {
                alert('所有任务已存在，无新任务导入');
            }
        }

        function importFromMD(content) {
            if (importMode === 'replace') {
                if (!confirm('确定要清空现有任务并导入新任务吗？此操作不可撤销。')) {
                    return;
                }
                tasks = [];
            }

            const taskObjs = [];
            const lines = content.split('\n');

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                const taskMatch = line.match(/^- \[([ x])\]\s*(.+)$/);
                if (taskMatch) {
                    const isCompleted = taskMatch[1] === 'x';
                    const title = taskMatch[2].replace(/\*\*|~~|🔴|🟡|🟢|📁|📅|✅/g, '').trim();

                    const taskObj = {
                        id: Date.now() + taskObjs.length,
                        title: title,
                        description: '',
                        category: '',
                        status: isCompleted ? STATUS.COMPLETED : STATUS.TODO,
                        priority: PRIORITY.MEDIUM,
                        due_date: '',
                        created_at: new Date().toISOString().split('T')[0],
                        updated_at: new Date().toISOString()
                    };

                    if (isCompleted) {
                        taskObj.completed_at = new Date().toISOString();
                    }

                    const metaMatch = taskMatch[2].match(/📁([^📅✅🔴🟡🟢\s*]+)/);
                    if (metaMatch) taskObj.category = metaMatch[1];
                    
                    const dateMatch = taskMatch[2].match(/📅(\d{4}-\d{2}-\d{2})/);
                    if (dateMatch) taskObj.due_date = dateMatch[1];
                    
                    if (taskMatch[2].includes('🔴')) taskObj.priority = PRIORITY.HIGH;
                    else if (taskMatch[2].includes('🟡')) taskObj.priority = PRIORITY.MEDIUM;
                    else if (taskMatch[2].includes('🟢')) taskObj.priority = PRIORITY.LOW;

                    if (importMode === 'replace' || !tasks.find(t => t.id === taskObj.id)) {
                        taskObjs.push(taskObj);
                    }
                }
                
                const tabMatch = line.match(/^\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|/);
                if (tabMatch && tabMatch[2] && !line.includes('---') && !line.startsWith('#')) {
                    const title = tabMatch[2].trim();
                    if (title && title !== '标题') {
                        const taskObj = {
                            id: Date.now() + taskObjs.length,
                            title: title,
                            description: tabMatch[3]?.trim() || '',
                            category: tabMatch[4]?.trim() || '',
                            status: tabMatch[5]?.trim() || STATUS.TODO,
                            priority: tabMatch[6]?.trim() || PRIORITY.MEDIUM,
                            due_date: tabMatch[7]?.trim() || '',
                            created_at: tabMatch[8]?.trim() || new Date().toISOString().split('T')[0],
                            updated_at: new Date().toISOString()
                        };
                        
                        if (taskObj.status === '已完成') taskObj.status = STATUS.COMPLETED;
                        else if (taskObj.status === '进行中') taskObj.status = STATUS.IN_PROGRESS;
                        else taskObj.status = STATUS.TODO;
                        
                        if (taskObj.priority === '高') taskObj.priority = PRIORITY.HIGH;
                        else if (taskObj.priority === '中') taskObj.priority = PRIORITY.MEDIUM;
                        else if (taskObj.priority === '低') taskObj.priority = PRIORITY.LOW;
                        
                        if (title && importMode === 'replace' || !tasks.find(t => t.title === title)) {
                            taskObjs.push(taskObj);
                        }
                    }
                }
            }

            if (taskObjs.length > 0) {
                tasks.push(...taskObjs);
                saveToStorage();
                renderTasks();
                alert(`成功导入 ${taskObjs.length} 个任务`);
            } else if (taskObjs.length === 0 && content.trim()) {
                alert('未找到有效的任务列表项');
            } else {
                alert('所有任务已存在，无新任务导入');
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function renderCategoryList() {
            const container = document.getElementById('categoryList');
            container.innerHTML = categories.map((cat, index) => `
                <div class="category-item flex items-center justify-between p-2 rounded-md">
                    <input type="text" value="${escapeHtml(cat)}" class="flex-1 px-2 py-1 bg-transparent border-none text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded" 
                        onchange="updateCategory(${index}, this.value)">
                    <button onclick="deleteCategory(${index})" class="ml-2 p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors cursor-pointer">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim();
            if (name && !categories.includes(name)) {
                categories.push(name);
                saveToStorage();
                renderCategoryList();
                updateCategoryFilter();
                updateNewTaskCategorySelect();
                input.value = '';
            }
        }

        function updateCategory(index, newName) {
            const oldName = categories[index];
            categories[index] = newName;
            
            tasks.forEach(task => {
                if (task.category === oldName) {
                    task.category = newName;
                }
            });
            
            saveToStorage();
            updateCategoryFilter();
            updateNewTaskCategorySelect();
            renderTasks();
        }

        function deleteCategory(index) {
            const name = categories[index];
            if (confirm(`确定要删除分类"${name}"吗？该分类下的任务将变为无分类。`)) {
                tasks.forEach(task => {
                    if (task.category === name) {
                        task.category = '';
                    }
                });
                
                categories.splice(index, 1);
                saveToStorage();
                renderCategoryList();
                updateCategoryFilter();
                updateNewTaskCategorySelect();
                renderTasks();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
