<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘漏斗 - 知HR工具集</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- Tailwind 配置 -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Fira Sans', 'system-ui', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
          }
        }
      }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s ease;
        }

        h1 {
            color: var(--text-primary);
            margin-bottom: 5px;
            font-size: 2.5rem;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .chart-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        #funnel-chart {
            width: 100%;
            height: 500px;
        }

        .editor-section {
            margin-top: 30px;
        }

        .editor-title {
            color: var(--text-primary);
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between; /* 让标题和按钮分别位于两端 */
        }

        .reset-data-btn {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            height: fit-content;
        }

        .reset-data-btn:hover {
            background: #ee6666;
            color: white;
            border-color: #ee6666;
        }

        .data-editor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .data-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            position: relative; /* 为绝对定位做准备 */
        }

        .add-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 2px dashed var(--input-border);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .data-item:hover {
            transform: translateY(-2px);
        }

        .data-item .item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            position: relative; /* 为删除按钮的定位创建新的上下文 */
        }

        .data-item .step-num {
            background: var(--input-border);
            color: var(--text-primary);
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* 删除按钮定位到整个data-item的右上角 */
        .data-item .delete-btn {
            position: absolute;
            top: -10px; /* 略微超出边框 */
            right: -10px; /* 略微超出边框 */
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            border: 2px solid var(--card-bg); /* 边框颜色与背景一致 */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 2; /* 确保按钮在顶层 */
        }

        .data-item .delete-btn:hover {
            background: rgba(255, 0, 0, 0.3);
            transform: scale(1.1);
            border-color: var(--card-bg);
        }

        .data-item input[type="text"] {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            width: 100%;
            transition: all 0.3s ease;
            padding-right: 25px; /* 为删除按钮留出空间 */
        }

        .data-item input[type="text"]:focus {
            outline: none;
            border-color: #5470c6;
        }

        .optional-tag {
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: var(--input-bg);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .add-item:hover {
            border-color: #5470c6;
            color: #5470c6;
            transform: translateY(-2px);
        }

        .data-item .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-picker {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid var(--input-border);
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
            background: transparent;
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        .color-picker::-webkit-color-swatch {
            border-radius: 4px;
            border: none;
        }

        .data-item input[type="number"] {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .data-item input[type="number"]:focus {
            outline: none;
            border-color: #5470c6;
            box-shadow: 0 0 0 3px rgba(84, 112, 198, 0.2);
        }

        .percent-toggle {
            display: flex;
            gap: 4px;
            margin-top: 10px;
        }

        .percent-toggle button {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .percent-toggle button:hover {
            border-color: #5470c6;
        }

        .percent-toggle button.active {
            background: #5470c6;
            border-color: #5470c6;
            color: #fff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-percent {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 浮动下载按钮 */
        .download-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #5470c6, #73c0de);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(84, 112, 198, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .download-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(84, 112, 198, 0.5);
        }

        .download-float svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        /* 下载弹窗 */
        .download-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .download-modal.show {
            display: flex;
        }

        .download-modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .download-modal-title {
            color: var(--text-primary);
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .download-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .download-btn {
            background: linear-gradient(135deg, #5470c6, #73c0de);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(84, 112, 198, 0.3);
        }

        .download-close {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }

        /* 隐藏的导出区域 */
        .export-area {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 1200px;
            background: white;  /* 使用纯白色背景，避免渐变色可能导致的模糊 */
            padding: 40px;
        }

        .export-area .export-title {
            text-align: center;
            color: #1a1a2e;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .export-area .export-chart {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .export-area .export-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .export-area .export-stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            min-width: 150px;
        }

        .export-area .export-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .export-area .export-stat-percent {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }

        .export-area .export-stat-label {
            color: #666;
            font-size: 0.85rem;
        }

        /* 导航栏样式 */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 50;
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #d1d8e0 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 0, 0, 0.1);
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --input-bg: #fff;
            --input-border: #ddd;
        }

        .dark {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #fff;
            --text-secondary: #a0a0a0;
            --input-bg: rgba(255, 255, 255, 0.1);
            --input-border: rgba(255, 255, 255, 0.2);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 6px;  /* 减小间距 */
            background: var(--card-bg);
            padding: 6px 12px;  /* 减小padding */
            border-radius: 20px;  /* 调整圆角 */
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;  /* 减小字体大小 */
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .theme-toggle span {
            color: var(--text-primary);
            font-size: 0.9rem;  /* 减小字体大小 */
        }

        .theme-switch {
            width: 36px;  /* 减小宽度到原来的一半左右 */
            height: 20px;  /* 减小高度 */
            background: var(--input-border);
            border-radius: 10px;  /* 调整圆角 */
            position: relative;
            transition: background 0.3s;
        }

        .theme-switch::after {
            content: '';
            position: absolute;
            width: 16px;  /* 减小滑块宽度 */
            height: 16px;  /* 减小滑块高度 */
            background: var(--text-primary);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        [data-theme="light"] .theme-switch::after {
            transform: translateX(16px);  /* 调整滑块移动距离 */
        }
    </style>
</head>

        <div class="export-stats" id="export-stats"></div>

    <script>
        // 工具函数模块 - 提供安全相关的工具函数
        class SecurityUtils {
          /**
           * 转义HTML字符以防止XSS攻击
           */
          static escapeHtml(text) {
            if (typeof text !== 'string') {
              text = String(text);
            }

            const map = {
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#039;'
            };

            return text.replace(/[&<>"']/g, (m) => map[m]);
          }

          /**
           * 验证颜色格式
           */
          static isValidColor(color) {
            return /^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/.test(color);
          }

          /**
           * 验证数值范围
           */
          static validateNumber(value, min = 0, max = Infinity) {
            const numValue = Number(value);
            if (isNaN(numValue)) {
              return min; // 返回最小值作为默认
            }
            return Math.min(Math.max(numValue, min), max);
          }

          /**
           * 限制字符串长度
           */
          static truncateString(str, maxLength = 100) {
            if (typeof str !== 'string') {
              str = String(str);
            }
            return str.substring(0, maxLength);
          }
        }

        // 数据管理模块
        class FunnelData {
          constructor() {
            // 定义初始数据
            this.defaultData = [
              { name: '简历投递', value: 1280, color: '#5470c6', percentType: 'total' },
              { name: '简历筛选', value: 560, color: '#91cc75', percentType: 'pass' },
              { name: '初试通过', value: 280, color: '#fac858', percentType: 'pass' },
              { name: '复试通过', value: 98, color: '#ee6666', percentType: 'pass' },
              { name: '录用', value: 45, color: '#73c0de', percentType: 'pass' },
              { name: '到岗', value: 40, color: '#ff9f7f', percentType: 'pass' }
            ];

            // 尝试从本地存储加载数据，如果不存在则使用默认数据
            const savedData = localStorage.getItem('funnelData');
            this.data = savedData ? JSON.parse(savedData) : [...this.defaultData];
          }

          // 保存数据到本地存储
          saveToLocalStorage() {
            try {
              localStorage.setItem('funnelData', JSON.stringify(this.data));
            } catch (error) {
              console.warn('无法保存数据到本地存储:', error);
            }
          }

          // 重置数据到默认状态
          resetToDefault() {
            try {
              // 确保数据完全重置 - 清空原数组然后复制新数据
              this.data.length = 0;  // 先清空数组
              this.defaultData.forEach(item => {
                // 深拷贝每个项目，确保不是引用
                this.data.push({
                  name: item.name,
                  value: item.value,
                  color: item.color,
                  percentType: item.percentType
                });
              });
              this.saveToLocalStorage();
              console.log('数据重置成功');
            } catch (error) {
              console.error('重置数据时发生错误:', error);
              // 如果出错，尝试恢复到默认数据
              this.data.length = 0;
              this.defaultData.forEach(item => {
                this.data.push({...item});
              });
            }
          }

          addStage() {
            const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#c7a4ff', '#ff9f7f', '#fc8452', '#9a60b4'];
            const newColor = colors[this.data.length % colors.length];
            this.data.push({
              name: '新阶段',
              value: 0,
              color: newColor,
              percentType: 'pass'
            });
            this.saveToLocalStorage(); // 保存更改到本地存储
          }

          updateName(idx, name) {
            if (idx < 0 || idx >= this.data.length) return;
            // 对名称进行基本清理
            const sanitizedName = String(name).substring(0, 50).replace(/[<>]/g, '');
            this.data[idx].name = sanitizedName;
            this.saveToLocalStorage(); // 保存更改到本地存储
          }

          updateValue(idx, value) {
            if (idx < 0 || idx >= this.data.length) return;
            const numValue = Math.max(0, parseInt(value, 10) || 0); // 确保非负数
            this.data[idx].value = numValue;
            this.saveToLocalStorage(); // 保存更改到本地存储
          }

          updateColor(idx, color) {
            if (idx < 0 || idx >= this.data.length) return;
            // 验证颜色格式
            const isValidColor = /^#([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$/.test(color);
            if (isValidColor) {
              this.data[idx].color = color;
              this.saveToLocalStorage(); // 保存更改到本地存储
            }
          }

          updatePercentType(idx, type) {
            if (idx < 0 || idx >= this.data.length) return;
            if (type === 'total' || type === 'pass') {
              this.data[idx].percentType = type;
              this.saveToLocalStorage(); // 保存更改到本地存储
            }
          }

          calcPercentages() {
            const max = Math.max(...this.data.map(d => d.value));
            return this.data.map((d, i) => ({
              ...d,
              percent: ((d.value / max) * 100).toFixed(1),
              passRate: i === 0 ? 100 : ((d.value / this.data[i - 1].value) * 100).toFixed(1)
            }));
          }
        }

        // 图表管理模块
        class ChartManager {
          constructor(containerId) {
            this.containerId = containerId;
            this.myChart = null;
          }

          init() {
            const chartDom = document.getElementById(this.containerId);
            this.myChart = echarts.init(chartDom);
          }

          update(data) {
            if (!this.myChart) return;

            const dataWithPercent = data.calcPercentages();
            const maxValue = Math.max(...data.data.map(d => d.value));
            const isLight = !document.documentElement.classList.contains('dark');
            const labelColor = isLight ? '#1a1a2e' : '#fff';

            const option = {
              tooltip: {
                trigger: 'item',
                formatter: function(params) {
                  const idx = params.dataIndex;
                  const d = dataWithPercent[idx];

                  // 安全处理数据，防止XSS
                  const name = String(d.name).replace(/[<>&"]/g, (match) => {
                    const escapeMap = { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' };
                    return escapeMap[match];
                  });

                  return `<strong>${name}</strong><br/>人数: ${d.value}人<br/>占比: ${d.percent}%`;
                },
                backgroundColor: 'rgba(0,0,0,0.8)',
                borderColor: '#333',
                textStyle: { color: '#fff' }
              },
              legend: {
                orient: 'vertical',
                left: 'left',
                top: 'center',
                textStyle: {
                  color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim() || '#fff',
                  fontSize: 14
                }
              },
              series: [{
                name: '招聘漏斗',
                type: 'funnel',
                left: '10%',  // 调整左侧空间
                top: 60,      // 增加上方空间
                bottom: 60,   // 增加下方空间
                width: '80%',  // 调整宽度
                min: 0,
                max: 100,
                minSize: '0%',
                maxSize: '100%',
                sort: 'descending',
                gap: 2,  // 减少间隙，为文本留出更多空间
                label: {
                  show: true,
                  position: 'inside',
                  formatter: function(params) {
                    const d = dataWithPercent[params.dataIndex];
                    const percent = d.percentType === 'total' ? `${d.percent}%` : `${d.passRate}%`;
                    const label = d.percentType === 'total' ? '整体占比' : '通过率';

                    // 修改格式：第一行为阶段名，第二行为"人数+标签+百分比"
                    return '{name|' + d.name + '}\n{' + 'info|' + d.value.toLocaleString() + '人(' + label + ')' + percent + '}';
                  },
                  color: labelColor,
                  fontSize: 14,  // 增大字体大小到与编辑器放大后的字体一致
                  fontWeight: 'bold',
                  lineHeight: 2,  // 进一步增加行高
                  textShadowBlur: 0,
                  textShadowColor: 'transparent',
                  textBorderColor: 'transparent',
                  textBorderWidth: 0,
                  rich: {
                    name: {
                      fontSize: 14,
                      color: labelColor,
                      fontWeight: 'bold',
                      align: 'center',
                      lineHeight: 20
                    },
                    info: {
                      fontSize: 12,
                      color: labelColor,
                      fontWeight: 'normal',
                      align: 'center',
                      lineHeight: 18
                    }
                  }
                },
                labelLine: {
                  length: 10,
                  lineStyle: { width: 1, type: 'solid' }
                },
                itemStyle: {
                  borderColor: isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)',
                  borderWidth: 1
                },
                emphasis: {
                  label: { fontSize: 16 }
                },
                data: data.data.map((d, idx) => ({
                  value: (d.value / maxValue) * 100,
                  name: d.name,
                  itemStyle: { color: d.color }
                }))
              }]
            };

            this.myChart.setOption(option, true);
          }

          resize() {
            if (this.myChart) {
              this.myChart.resize();
            }
          }
        }

        // 主题管理模块
        class ThemeManager {
          constructor() {
            this.currentTheme = this.getCurrentTheme();
          }

          toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');

            if (isDark) {
              html.classList.remove('dark');
              html.classList.add('light');
              localStorage.setItem('theme', 'light');
            } else {
              html.classList.remove('light');
              html.classList.add('dark');
              localStorage.setItem('theme', 'dark');
            }

            // 重新初始化 Lucide 图标以更新显示
            lucide.createIcons();

            return this.getCurrentTheme();
          }

          getCurrentTheme() {
            return document.documentElement.classList.contains('dark') ? 'dark' : 'light';
          }

          setCurrentTheme(theme) {
            const html = document.documentElement;
            html.classList.remove('light', 'dark');
            html.classList.add(theme);
          }
        }

        // 统计信息模块
        class StatsManager {
          constructor(containerId) {
            this.containerId = containerId;
          }

          update(data) {
            const dataWithPercent = data.calcPercentages();
            const statsEl = document.getElementById(this.containerId);

            // 使用DOM方法创建元素以防止XSS
            statsEl.innerHTML = ''; // 清空现有内容

            dataWithPercent.forEach((d, idx) => {
              const percent = d.percentType === 'total' ? `占比 ${d.percent}%` : `通过率 ${d.passRate}%`;

              // 创建元素而不是使用innerHTML
              const cardDiv = document.createElement('div');
              cardDiv.className = 'stat-card';

              const valueDiv = document.createElement('div');
              valueDiv.className = 'stat-value';
              valueDiv.textContent = `${d.value}人`; // 使用textContent防止XSS
              valueDiv.style.color = d.color;

              const percentDiv = document.createElement('div');
              percentDiv.className = 'stat-percent';
              percentDiv.textContent = percent;

              const labelDiv = document.createElement('div');
              labelDiv.className = 'stat-label';
              labelDiv.textContent = d.name;

              cardDiv.appendChild(valueDiv);
              cardDiv.appendChild(percentDiv);
              cardDiv.appendChild(labelDiv);

              statsEl.appendChild(cardDiv);
            });
          }
        }

        // 编辑器模块
        class EditorManager {
          constructor(containerId, funnelData) {
            this.containerId = containerId;
            this.funnelData = funnelData;
          }

          render() {
            const editorEl = document.getElementById(this.containerId);
            editorEl.innerHTML = ''; // 清空现有内容

            // 为每个数据项创建DOM元素
            this.funnelData.data.forEach((d, idx) => {
              // 创建主要容器
              const itemDiv = document.createElement('div');
              itemDiv.className = 'data-item';

              // 创建标题栏容器
              const headerDiv = document.createElement('div');
              headerDiv.className = 'item-header';

              // 创建序号
              const stepSpan = document.createElement('span');
              stepSpan.className = 'step-num';
              stepSpan.textContent = idx + 1;

              // 创建名称输入框
              const nameInput = document.createElement('input');
              nameInput.type = 'text';
              nameInput.value = d.name;
              nameInput.placeholder = '阶段名称';
              nameInput.addEventListener('change', () => {
                window.app.updateName(idx, nameInput.value);
              });

              // 创建删除按钮
              const deleteBtn = document.createElement('button');
              deleteBtn.className = 'delete-btn';
              deleteBtn.textContent = '×';
              deleteBtn.title = '删除此阶段';
              deleteBtn.addEventListener('click', () => {
                window.app.deleteStage(idx);
              });

              // 将元素添加到标题栏
              headerDiv.appendChild(stepSpan);
              headerDiv.appendChild(nameInput);
              headerDiv.appendChild(deleteBtn);

              // 创建输入组容器
              const inputGroupDiv = document.createElement('div');
              inputGroupDiv.className = 'input-group';

              // 创建颜色选择器
              const colorInput = document.createElement('input');
              colorInput.type = 'color';
              colorInput.className = 'color-picker';
              colorInput.value = d.color;
              colorInput.addEventListener('change', () => {
                window.app.updateColor(idx, colorInput.value);
              });

              // 创建数值输入框
              const valueInput = document.createElement('input');
              valueInput.type = 'number';
              valueInput.min = '0';
              valueInput.value = d.value;
              valueInput.placeholder = '人数';
              valueInput.addEventListener('change', () => {
                window.app.updateValue(idx, valueInput.value);
              });

              // 将输入元素添加到组容器
              inputGroupDiv.appendChild(colorInput);
              inputGroupDiv.appendChild(valueInput);

              // 创建百分比类型选择器
              const percentToggleDiv = document.createElement('div');
              percentToggleDiv.className = 'percent-toggle';

              // 创建整体占比按钮
              const totalBtn = document.createElement('button');
              totalBtn.textContent = '整体占比';
              if (d.percentType === 'total') {
                totalBtn.classList.add('active');
              }
              totalBtn.addEventListener('click', () => {
                // 移除之前激活的按钮
                totalBtn.classList.add('active');
                passBtn.classList.remove('active');
                window.app.updatePercentType(idx, 'total');
              });

              // 创建通过率按钮
              const passBtn = document.createElement('button');
              passBtn.textContent = '通过率';
              if (d.percentType === 'pass') {
                passBtn.classList.add('active');
              }
              passBtn.addEventListener('click', () => {
                // 移除之前激活的按钮
                passBtn.classList.add('active');
                totalBtn.classList.remove('active');
                window.app.updatePercentType(idx, 'pass');
              });

              // 添加按钮到百分比切换容器
              percentToggleDiv.appendChild(totalBtn);
              percentToggleDiv.appendChild(passBtn);

              // 将所有元素添加到项目容器
              itemDiv.appendChild(headerDiv);
              itemDiv.appendChild(inputGroupDiv);
              itemDiv.appendChild(percentToggleDiv);

              // 添加到编辑器容器
              editorEl.appendChild(itemDiv);
            });

            // 添加"添加一层"按钮
            const addItemDiv = document.createElement('div');
            addItemDiv.className = 'add-item';
            addItemDiv.textContent = '+ 添加一层';
            addItemDiv.addEventListener('click', () => {
              window.app.addStage();
            });
            editorEl.appendChild(addItemDiv);
          }

          bindEvents() {
            // 绑定编辑器相关事件
          }
        }

        // 导出功能模块
        class ExportManager {
          constructor() {
            this.exportAreaId = 'export-area';
            this.exportChartId = 'export-chart';
            this.exportStatsId = 'export-stats';
          }

          prepareExportArea(funnelData) {
            const dataWithPercent = funnelData.calcPercentages();

            // 更新导出统计卡片 - 使用DOM方法防止XSS
            const exportStats = document.getElementById(this.exportStatsId);
            exportStats.innerHTML = ''; // 清空现有内容

            dataWithPercent.forEach(d => {
              const percent = d.percentType === 'total' ? `占比 ${d.percent}%` : `通过率 ${d.passRate}%`;

              // 创建元素而不是使用innerHTML
              const cardDiv = document.createElement('div');
              cardDiv.className = 'export-stat-card';

              const valueDiv = document.createElement('div');
              valueDiv.className = 'export-stat-value';
              valueDiv.textContent = `${d.value}人`; // 使用textContent防止XSS
              valueDiv.style.color = d.color;

              const percentDiv = document.createElement('div');
              percentDiv.className = 'export-stat-percent';
              percentDiv.textContent = percent;

              const labelDiv = document.createElement('div');
              labelDiv.className = 'export-stat-label';
              labelDiv.textContent = d.name;

              cardDiv.appendChild(valueDiv);
              cardDiv.appendChild(percentDiv);
              cardDiv.appendChild(labelDiv);

              exportStats.appendChild(cardDiv);
            });
          }

          async downloadImage(type, funnelData) {
            this.hideDownloadModal();
            this.prepareExportArea(funnelData);

            const exportArea = document.getElementById(this.exportAreaId);
            const exportChart = document.getElementById(this.exportChartId);

            // 创建临时图表
            const tempChartDom = document.createElement('div');
            tempChartDom.style.width = '1140px';
            tempChartDom.style.height = '500px';
            exportChart.innerHTML = '';
            exportChart.appendChild(tempChartDom);

            const tempChart = echarts.init(tempChartDom);
            const dataWithPercent = funnelData.calcPercentages();
            const maxValue = Math.max(...funnelData.data.map(d => d.value));

            const option = {
              tooltip: { show: false },
              legend: {
                orient: 'vertical',
                left: 'left',
                top: 'center',
                textStyle: { color: '#1a1a2e', fontSize: 14 }
              },
              series: [{
                name: '招聘漏斗',
                type: 'funnel',
                left: '10%',  // 调整左侧空间
                top: 60,      // 增加上方空间
                bottom: 60,   // 增加下方空间
                width: '80%',  // 调整宽度
                min: 0,
                max: 100,
                minSize: '0%',
                maxSize: '100%',
                sort: 'descending',
                gap: 2,  // 减少间隙，为文本留出更多空间
                label: {
                  show: true,
                  position: 'inside',
                  formatter: function(params) {
                    const d = dataWithPercent[params.dataIndex];
                    const percent = d.percentType === 'total' ? `${d.percent}%` : `${d.passRate}%`;
                    const label = d.percentType === 'total' ? '整体占比' : '通过率';

                    // 修改格式：第一行为阶段名，第二行为"人数+标签+百分比"
                    return '{name|' + d.name + '}\n{' + 'info|' + d.value.toLocaleString() + '人(' + label + ')' + percent + '}';
                  },
                  color: '#fff',
                  fontSize: 14,  // 增大字体大小到与编辑器放大后的字体一致
                  fontWeight: 'bold',
                  lineHeight: 2,  // 进一步增加行高
                  textShadowBlur: 0,
                  textShadowColor: 'transparent',
                  textBorderColor: 'transparent',
                  textBorderWidth: 0,
                  rich: {
                    name: {
                      fontSize: 14,
                      color: '#fff',
                      fontWeight: 'bold',
                      align: 'center',
                      lineHeight: 20
                    },
                    info: {
                      fontSize: 12,
                      color: '#fff',
                      fontWeight: 'normal',
                      align: 'center',
                      lineHeight: 18
                    }
                  }
                },
                itemStyle: {
                  borderColor: 'rgba(255,255,255,0.3)',
                  borderWidth: 2
                },
                data: funnelData.data.map(d => ({
                  value: (d.value / maxValue) * 100,
                  name: d.name,
                  itemStyle: { color: d.color }
                }))
              }]
            };

            tempChart.setOption(option);

            // 等待图表渲染
            await new Promise(resolve => setTimeout(resolve, 500));

            // 根据类型决定导出区域
            let targetElement;
            if (type === 'chart') {
              // 只导出图表
              targetElement = exportChart;
            } else {
              // 导出完整报告
              targetElement = exportArea;
            }

            // 使用 html2canvas 生成图片
            const canvas = await window.html2canvas(targetElement, {
              backgroundColor: '#ffffff',  // 设置白色背景而不是透明
              scale: 3,  // 增加缩放比例以提高清晰度
              useCORS: true,
              logging: false,
              width: targetElement.scrollWidth,
              height: targetElement.scrollHeight,
              scrollX: 0,
              scrollY: 0
            });

            // 下载图片
            const link = document.createElement('a');
            link.download = type === 'chart' ? '招聘漏斗图.png' : '招聘漏斗报告.png';
            link.href = canvas.toDataURL('image/png');
            link.click();

            // 清理
            tempChart.dispose();
            exportChart.innerHTML = '';
          }

          showDownloadModal() {
            document.getElementById('download-modal').classList.add('show');
          }

          hideDownloadModal() {
            document.getElementById('download-modal').classList.remove('show');
          }
        }

        // 主应用模块
        class App {
          constructor() {
            this.funnelData = new FunnelData();
            this.chartManager = new ChartManager('funnel-chart');
            this.statsManager = new StatsManager('stats');
            this.editorManager = new EditorManager('data-editor', this.funnelData);
            this.themeManager = new ThemeManager();
            this.exportManager = new ExportManager();
          }

          init() {
            // 初始化图表
            this.chartManager.init();

            // 更新所有组件
            this.updateAll();

            // 绑定窗口大小变化事件
            window.addEventListener('resize', () => {
              this.chartManager.resize();
            });
          }

          updateAll() {
            // 更新图表
            this.chartManager.update(this.funnelData);

            // 更新统计数据
            this.statsManager.update(this.funnelData);

            // 更新编辑器
            this.editorManager.render();
          }

          // 以下方法供全局调用
          addStage() {
            this.funnelData.addStage();
            this.updateAll();
          }

          resetData() {
            console.log('开始重置数据...');
            this.funnelData.resetToDefault();
            // 添加短暂延时确保数据完全重置后再更新UI
            setTimeout(() => {
              this.updateAll();
              console.log('数据重置完成，UI已更新');
            }, 50);
          }

          deleteStage(idx) {
            if (this.funnelData.data.length <= 1) {
              alert('至少需要保留一个阶段！');
              return;
            }

            this.funnelData.data.splice(idx, 1);
            this.updateAll();
          }

          updateName(idx, name) {
            // 使用安全工具验证和处理输入
            const sanitizedName = SecurityUtils.truncateString(
              SecurityUtils.escapeHtml(String(name || '')), 50
            );
            this.funnelData.updateName(idx, sanitizedName);
            this.updateAll();
          }

          updateValue(idx, value) {
            // 验证并规范化数值
            const validatedValue = SecurityUtils.validateNumber(value, 0, 999999);
            this.funnelData.updateValue(idx, validatedValue);
            this.updateAll();
          }

          updateColor(idx, color) {
            // 验证颜色格式
            if (SecurityUtils.isValidColor(color)) {
              this.funnelData.updateColor(idx, color);
              this.updateAll();
            }
          }

          updatePercentType(idx, type) {
            if (type === 'total' || type === 'pass') {
              this.funnelData.updatePercentType(idx, type);
              this.updateAll();
            }
          }

          toggleTheme() {
            this.themeManager.toggleTheme();
            // 延迟更新图表以适应主题变化
            setTimeout(() => {
              this.updateAll();
            }, 100);
          }

          showDownloadModal() {
            this.exportManager.showDownloadModal();
          }

          hideDownloadModal() {
            this.exportManager.hideDownloadModal();
          }

          async downloadImage(type) {
            await this.exportManager.downloadImage(type, this.funnelData);
          }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
          // 初始化 Lucide 图标
          lucide.createIcons();

          // 从本地存储加载主题设置
          const savedTheme = localStorage.getItem('theme');
          const html = document.documentElement;
          if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.remove('light');
            html.classList.add('dark');
          } else {
            html.classList.remove('dark');
            html.classList.add('light');
          }
          // 重新初始化图标以更新显示
          lucide.createIcons();

          window.app = new App();
          window.app.init();

          // 为元素绑定事件
          document.getElementById('themeToggle').addEventListener('click', () => window.app.toggleTheme());
          document.getElementById('download-float').addEventListener('click', () => window.app.showDownloadModal());
          document.getElementById('download-chart-btn').addEventListener('click', () => window.app.downloadImage('chart'));
          document.getElementById('download-full-btn').addEventListener('click', () => window.app.downloadImage('full'));
          document.getElementById('download-cancel-btn').addEventListener('click', () => window.app.hideDownloadModal());
          document.getElementById('reset-data-btn').addEventListener('click', () => window.app.resetData());

          // 关闭模态框功能：点击模态框外部区域关闭
          document.getElementById('download-modal').addEventListener('click', (e) => {
            if (e.target.id === 'download-modal') {
              window.app.hideDownloadModal();
            }
          });
        });
    </script>
</body>
