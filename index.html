<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知HR工具集 - HR一站式效率工具平台</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'system-ui', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50: '#EFF6FF',
              100: '#DBEAFE',
              200: '#BFDBFE',
              300: '#93C5FD',
              400: '#60A5FA',
              500: '#3B82F6',
              600: '#2563EB',
              700: '#1D4ED8',
              800: '#1E40AF',
              900: '#1E3A8A',
            },
            cta: {
              500: '#F97316',
              600: '#EA580C',
            },
            success: '#4CAF50',
            warning: '#F59E0B',
            error: '#F44336',
            info: '#2196F3',
          }
        }
      }
    }
  </script>

  <style>
    /* 平滑滚动 */
    html {
      scroll-behavior: smooth;
    }

    /* 拼图网格布局 */
    .mosaic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      width: 100%;
    }

    /* 拼图块基础样式 */
    .mosaic-tile {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    /* 活动工具拼图 */
    .mosaic-tile.active {
      background: linear-gradient(135deg, var(--tile-color-start, #2563EB), var(--tile-color-end, #3B82F6));
      color: white;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
    }

    .mosaic-tile.active:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
    }

    /* 空工具拼图（灰色） */
    .mosaic-tile.empty {
      background: #F1F5F9;
      color: #94A3B8;
      border: 2px dashed #E2E8F0;
    }

    .dark .mosaic-tile.empty {
      background: #1E293B;
      color: #64748B;
      border-color: #334155;
    }

    .mosaic-tile.empty:hover {
      background: #E2E8F0;
      border-color: #CBD5E1;
    }

    .dark .mosaic-tile.empty:hover {
      background: #334155;
      border-color: #475569;
    }

    /* 拼图图标 */
    .tile-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
    }

    .mosaic-tile.active .tile-icon {
      color: white;
    }

    .mosaic-tile.empty .tile-icon {
      color: #94A3B8;
    }

    .dark .mosaic-tile.empty .tile-icon {
      color: #64748B;
    }

    /* 拼图名称 */
    .tile-name {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
    }

    /* 拼图描述 */
    .tile-desc {
      font-size: 12px;
      text-align: center;
      opacity: 0.9;
      max-width: 150px;
    }

    .mosaic-tile.empty .tile-desc {
      opacity: 0.7;
    }

    /* 空拼图提示 */
    .empty-hint {
      font-size: 11px;
      text-align: center;
      opacity: 0.6;
      margin-top: 8px;
    }

    /* 深色模式适配 */
    .dark .mosaic-tile.active {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .dark .mosaic-tile.active:hover {
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .mosaic-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 8px;
      }

      .mosaic-tile {
        padding: 12px;
      }

      .tile-icon {
        width: 32px;
        height: 32px;
      }

      .tile-name {
        font-size: 12px;
      }

      .tile-desc {
        font-size: 10px;
      }

      .empty-hint {
        display: none;
      }
    }

    /* 打印样式 */
    @media print {
      .no-print {
        display: none !important;
      }
    }

    /* 移动端底部安全区域 */
    @media (max-width: 768px) {
      body {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }

      /* 按钮区域改为垂直布局 */
      #feedbackForm .flex.items-center.gap-4 {
        flex-wrap: wrap;
        gap: 8px;
      }

      #feedbackForm .flex.items-center.gap-4 > span {
        order: 3;
        width: 100%;
        text-align: center;
      }

      /* 反馈看板内容截断 */
      .feedback-content {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200">

  <!-- ==================== 统一导航栏 ==================== -->
  <nav class="h-16 bg-white border-b border-slate-200 dark:bg-slate-800 dark:border-slate-700 px-4 md:px-6 lg:px-8 flex items-center justify-between sticky top-0 z-50 shadow-sm">
    <!-- 左侧：Logo + 工具名称 -->
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.open('https://www.zhihr.vip', '_blank')">
      <!-- Logo -->
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 dark:text-blue-400">
        <circle cx="12" cy="5" r="1"/>
        <path d="m9 20 3-6 3 6"/>
        <path d="m6 8 6 2 6-2"/>
        <path d="M12 10v4"/>
      </svg>

      <!-- 工具名称 -->
      <div>
        <h1 class="text-lg font-semibold text-slate-800 dark:text-slate-100">知HR</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400">Vibe Coding，为HR制作效率工具</p>
      </div>
    </div>

    <!-- 右侧：功能按钮 -->
    <div class="flex items-center gap-2">
      <!-- 搜索按钮 -->
      <button
        id="searchBtn"
        class="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 dark:text-slate-300 dark:hover:bg-slate-700 rounded-md transition-colors duration-200 cursor-pointer"
        aria-label="搜索工具"
        title="搜索工具"
      >
        <i data-lucide="search" class="w-5 h-5"></i>
      </button>

      <!-- 主题切换 -->
      <button
        id="themeToggle"
        class="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 dark:text-slate-300 dark:hover:bg-slate-700 rounded-md transition-colors duration-200 cursor-pointer"
        aria-label="切换主题"
        title="切换深色/浅色模式"
      >
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
      </button>

      <!-- 帮助按钮 -->
      <button
        id="helpBtn"
        class="p-2 text-slate-600 hover:text-blue-600 hover:bg-blue-50 dark:text-slate-300 dark:hover:bg-slate-700 rounded-md transition-colors duration-200 cursor-pointer"
        aria-label="帮助"
        title="使用说明"
      >
        <i data-lucide="help-circle" class="w-5 h-5"></i>
      </button>
    </div>
  </nav>

  <!-- ==================== 主容器 ==================== -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 pt-5 pb-10">

    <!-- ==================== 拼图网格导航 ==================== -->
    <div class="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm p-6 mb-5">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100">工具导航</h3>
        <div class="flex items-center gap-2">
          <span class="text-sm text-slate-600 dark:text-slate-400">已启用: <span id="activeCount" class="font-semibold text-blue-600">5</span>/100</span>
        </div>
      </div>

      <!-- 拼图网格 -->
      <div id="mosaicGrid" class="mosaic-grid">
        <!-- 工具将通过 JavaScript 动态渲染 -->
      </div>
    </div>

    <!-- ==================== 反馈看板 ==================== -->
    <div class="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm p-6 mb-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100">收到的需求</h3>
        <span class="text-sm text-slate-500 dark:text-slate-400">最近提交</span>
      </div>

      <!-- 反馈列表（最多显示5条，滚动） -->
      <div id="feedbackBoard" class="space-y-3 max-h-64 overflow-y-auto overflow-x-hidden">
        <!-- 由 JavaScript 动态渲染 -->
      </div>
    </div>

    <!-- ==================== 反馈区域 ==================== -->
    <div class="bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm p-6">
      <h3 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-2">提交新工具需求</h3>
      <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">告诉我们你在工作中遇到的痛点，我们免费来帮你开发工具</p>

      <form id="feedbackForm" class="space-y-4">
        <div class="flex gap-4">
          <input
            type="text"
            id="feedbackName"
            class="flex-1 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-slate-700 dark:text-slate-100"
            placeholder="你的名字（选填）"
          >
        </div>
        <textarea
          id="feedbackContent"
          class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-slate-700 dark:text-slate-100 resize-none"
          rows="3"
          placeholder="描述你需要的工具功能..."
          required
        ></textarea>

        <!-- 验证码区域 -->
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 px-3 py-2 bg-slate-100 dark:bg-slate-700 rounded-md">
            <span id="captchaQuestion" class="text-sm font-medium text-slate-800 dark:text-slate-200">3 + 5 = ?</span>
            <button
              id="refreshCaptcha"
              type="button"
              class="p-1 text-slate-500 hover:text-blue-600 cursor-pointer"
              title="刷新验证码"
            >
              <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
          </div>
          <input
            type="number"
            id="captchaInput"
            class="w-20 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-100"
            placeholder="答案"
            required
          >
          <span id="captchaError" class="text-xs text-red-500 hidden">验证码错误</span>
        </div>

        <!-- 提交次数提示 -->
        <div id="submitLimitInfo" class="text-xs text-slate-500 dark:text-slate-400">
          今日可提交：<span id="remainingCount">3</span> 次
        </div>
        <div id="submitLimitWarning" class="text-sm text-orange-500 hidden">
          今日提交次数已达上限，请明天再来
        </div>

        <div class="flex items-center gap-4">
          <button
            type="submit"
            id="submitBtn"
            class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors duration-200 cursor-pointer flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <i data-lucide="send" class="w-4 h-4"></i>
            <span>提交需求</span>
          </button>

          <span class="text-xs text-slate-500 dark:text-slate-400">提交后将显示在收到的需求里</span>
        </div>
      </form>
    </div>

  </main>

  <!-- ==================== JavaScript ==================== -->
  <script>
    // 初始化 Lucide 图标
    lucide.createIcons();

    // ==================== API 配置 ====================
    // JSONBin.io API配置
    const API_CONFIG = {
      binId: '69dde8c6856a6821893044cc',
      accessKey: '$2a$10$WSf1YU/B6AcJaK1CsPYb4.V.mCaHZfPftfgBeYwtwR5dF2AeSP8i.',
      baseUrl: 'https://api.jsonbin.io/v3/b'
    };

    // EmailJS 配置
    const EMAILJS_CONFIG = {
      publicKey: 'wSqoO64Pd08fm_YJV',
      serviceId: 'service_xg8y8h9',
      templateId: 'template_yoss5zo'
    };

    // 初始化 EmailJS
    emailjs.init(EMAILJS_CONFIG.publicKey);

    // ==================== 工具数据配置 ====================
    const TOOLS_CONFIG = [
      {
        id: 1,
        name: '项目甘特图',
        desc: '可视化项目进度',
        icon: 'gantt-chart',
        url: 'https://www.zhihr.vip//gantt-web/index.html',
        colorStart: '#E74C3C',
        colorEnd: '#C0392B'
      },
      {
        id: 2,
        name: '员工数据看板',
        desc: '花名册可视化',
        icon: 'users',
        url: 'https://www.zhihr.vip/dashboard/index.html',
        colorStart: '#3498DB',
        colorEnd: '#2980B9'
      },
      {
        id: 3,
        name: '组织架构图',
        desc: '团队结构一目了然',
        icon: 'network',
        url: 'https://www.zhihr.vip/org-chart/index.html',
        colorStart: '#27AE60',
        colorEnd: '#1E8449'
      },
      {
        id: 4,
        name: '招聘漏斗',
        desc: '转化流程分析',
        icon: 'filter',
        url: 'https://www.zhihr.vip/funnel/index.html',
        colorStart: '#F39C12',
        colorEnd: '#D68910'
      },

    ];

    // 拼图总数（可扩展至50或100）
    const TOTAL_TILES = 6;

    // ==================== 点击频次管理 ====================
    function getClickCounts() {
      return JSON.parse(localStorage.getItem('tool_click_counts') || '{}');
    }

    function saveClickCounts(counts) {
      localStorage.setItem('tool_click_counts', JSON.stringify(counts));
    }

    function incrementClickCount(toolId) {
      const counts = getClickCounts();
      counts[toolId] = (counts[toolId] || 0) + 1;
      saveClickCounts(counts);
    }

    // 根据点击频次排序工具
    function sortToolsByClickCount() {
      const counts = getClickCounts();
      return [...TOOLS_CONFIG].sort((a, b) => {
        const countA = counts[a.id] || 0;
        const countB = counts[b.id] || 0;
        return countB - countA; // 点击多的排前面
      });
    }

    // ==================== 渲染拼图网格 ====================
    function renderMosaicGrid() {
      const gridContainer = document.getElementById('mosaicGrid');
      gridContainer.innerHTML = '';

      // 按点击频次排序
      const sortedTools = sortToolsByClickCount();

      for (let i = 0; i < TOTAL_TILES; i++) {
        const tool = sortedTools[i];

        const tile = document.createElement('div');
        tile.className = `mosaic-tile ${tool ? 'active' : 'empty'}`;

        if (tool) {
          // 活动工具拼图
          tile.style.setProperty('--tile-color-start', tool.colorStart);
          tile.style.setProperty('--tile-color-end', tool.colorEnd);

          tile.innerHTML = `
            <i data-lucide="${tool.icon}" class="tile-icon"></i>
            <div class="tile-name">${tool.name}</div>
            <div class="tile-desc">${tool.desc}</div>
          `;

          // 点击打开新标签页并记录点击次数
          tile.addEventListener('click', () => {
            incrementClickCount(tool.id);
            window.open(tool.url, '_blank');
          });
        } else {
          // 空工具拼图（灰色）
          tile.innerHTML = `
            <i data-lucide="plus" class="tile-icon"></i>
            <div class="tile-name">待添加</div>
            <div class="empty-hint">点击提交建议</div>
          `;

          // 点击滚动到反馈区域
          tile.addEventListener('click', () => {
            document.getElementById('feedbackForm').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('feedbackForm').querySelector('textarea').focus();
          });
        }

        gridContainer.appendChild(tile);
      }

      // 重新初始化图标
      lucide.createIcons();

      // 更新统计
      document.getElementById('activeCount').textContent = TOOLS_CONFIG.length;
    }

    // ==================== 主题切换 ====================
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // 检查本地存储的主题偏好
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
    }

    // 主题切换功能
    themeToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ==================== 搜索功能 ====================
    const searchBtn = document.getElementById('searchBtn');

    searchBtn.addEventListener('click', () => {
      const searchTerm = prompt('搜索工具名称:');
      if (searchTerm) {
        const foundTool = TOOLS_CONFIG.find(tool =>
          tool.name.toLowerCase().includes(searchTerm.toLowerCase())
        );

        if (foundTool) {
          window.open(foundTool.url, '_blank');
        } else {
          alert('未找到相关工具，请提交建议让我们开发！');
        }
      }
    });

    // ==================== 帮助功能 ====================
    const helpBtn = document.getElementById('helpBtn');

    helpBtn.addEventListener('click', () => {
      alert('使用说明：\n\n1. 点击彩色拼图块打开对应工具\n2. 点击灰色拼图块提交新工具建议\n3. 使用搜索按钮快速查找工具\n4. 切换深色/浅色模式适应环境');
    });

    // ==================== 反馈看板渲染（从JSONBin.io拉取） ====================
    async function renderFeedbackBoard() {
      const board = document.getElementById('feedbackBoard');
      board.innerHTML = '<div class="text-center py-8"><p class="text-sm text-slate-500">正在加载...</p></div>';

      try {
        const response = await fetch(`${API_CONFIG.baseUrl}/${API_CONFIG.binId}`, {
          headers: {
            'X-Access-Key': API_CONFIG.accessKey
          }
        });

        if (!response.ok) {
          throw new Error(`API返回${response.status}`);
        }

        const data = await response.json();
        const feedbacks = data.record?.feedbacks || [];

        if (feedbacks.length === 0) {
          board.innerHTML = `
            <div class="text-center py-8">
              <p class="text-sm text-slate-500 dark:text-slate-400">暂无提交的需求</p>
              <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">提交后将在此显示</p>
            </div>
          `;
          return;
        }

        // 按时间倒序排列（最新的在前）
        feedbacks.sort((a, b) => new Date(b.time) - new Date(a.time));
        renderFeedbackItems(board, feedbacks);
      } catch (error) {
        console.log('API失败，显示模拟数据:', error.message);
        renderMockFeedbacks(board);
      }
    }

    // ==================== 渲染反馈列表项 ====================
    function renderFeedbackItems(board, feedbacks) {
      board.innerHTML = '';

      const statusColors = {
        'pending': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300',
        'processing': 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300',
        'completed': 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300'
      };
      const statusTexts = {
        'pending': '待处理',
        'processing': '处理中',
        'completed': '已完成'
      };

      feedbacks.forEach(fb => {
        const item = document.createElement('div');
        item.className = 'bg-slate-50 dark:bg-slate-700/50 rounded-lg p-3';

        // 格式化时间
        const time = new Date(fb.time);
        const timeStr = `${time.getFullYear()}年${time.getMonth() + 1}月${time.getDate()}日`;

        item.innerHTML = `
          <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 overflow-hidden">
            <div class="flex items-center gap-3 sm:gap-4 shrink-0">
              <span class="text-sm font-medium text-slate-800 dark:text-slate-100 whitespace-nowrap">${fb.name}</span>
              <span class="text-sm text-slate-600 dark:text-slate-300 whitespace-nowrap">${timeStr}</span>
              <span class="px-2 py-1 text-xs rounded-full ${statusColors[fb.status]} whitespace-nowrap">${statusTexts[fb.status]}</span>
            </div>
            <div class="text-sm text-slate-600 dark:text-slate-300 flex-1 min-w-0 overflow-hidden">
              <span class="block truncate">${fb.content}</span>
            </div>
          </div>
        `;

        board.appendChild(item);
      });
    }

    // ==================== 模拟数据（API失败时显示） ====================
    function renderMockFeedbacks(board) {
      board.innerHTML = '';

      const mockData = [
        {
          name: '张三',
          time: '2026年4月10日',
          status: 'completed',
          content: '希望能有一个自动生成周报的工具，每周手动写周报太费时间了'
        },
        {
          name: '李四',
          time: '2026年4月11日',
          status: 'processing',
          content: '需要离职率分析工具，可以按部门、时间段统计分析离职情况'
        },
        {
          name: '王五',
          time: '2026年4月12日',
          status: 'pending',
          content: '人才盘点分析工具，希望能可视化展示人才结构和分布'
        },
        {
          name: '匿名',
          time: '2026年4月13日',
          status: 'pending',
          content: 'OKR追踪工具，方便团队设定和跟踪目标完成进度'
        }
      ];

      const statusColors = {
        'pending': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300',
        'processing': 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300',
        'completed': 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300'
      };
      const statusTexts = {
        'pending': '待处理',
        'processing': '处理中',
        'completed': '已完成'
      };

      mockData.forEach(fb => {
        const item = document.createElement('div');
        item.className = 'bg-slate-50 dark:bg-slate-700/50 rounded-lg p-3';

        item.innerHTML = `
          <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 overflow-hidden">
            <div class="flex items-center gap-3 sm:gap-4 shrink-0">
              <span class="text-sm font-medium text-slate-800 dark:text-slate-100 whitespace-nowrap">${fb.name}</span>
              <span class="text-sm text-slate-600 dark:text-slate-300 whitespace-nowrap">${fb.time}</span>
              <span class="px-2 py-1 text-xs rounded-full ${statusColors[fb.status]} whitespace-nowrap">${statusTexts[fb.status]}</span>
            </div>
            <div class="text-sm text-slate-600 dark:text-slate-300 flex-1 min-w-0 overflow-hidden">
              <span class="block truncate">${fb.content}</span>
            </div>
          </div>
        `;

        board.appendChild(item);
      });
    }

    // ==================== 验证码和提交限制 ====================
    let captchaAnswer = 0;

    // 生成验证码
    function generateCaptcha() {
      const num1 = Math.floor(Math.random() * 10) + 1;
      const num2 = Math.floor(Math.random() * 10) + 1;
      captchaAnswer = num1 + num2;
      document.getElementById('captchaQuestion').textContent = `${num1} + ${num2} = ?`;
      document.getElementById('captchaInput').value = '';
      document.getElementById('captchaError').classList.add('hidden');
    }

    // 获取今日提交次数
    function getTodaySubmitCount() {
      const today = new Date().toLocaleDateString('zh-CN');
      const submitData = JSON.parse(localStorage.getItem('submit_limits') || '{}');
      if (submitData.date === today) {
        return submitData.count || 0;
      }
      return 0;
    }

    // 更新今日提交次数
    function updateSubmitCount() {
      const today = new Date().toLocaleDateString('zh-CN');
      const submitData = {
        date: today,
        count: getTodaySubmitCount() + 1
      };
      localStorage.setItem('submit_limits', JSON.stringify(submitData));
    }

    // 更新剩余次数显示
    function updateRemainingCount() {
      const remaining = Math.max(0, 3 - getTodaySubmitCount());
      document.getElementById('remainingCount').textContent = remaining;

      const limitInfo = document.getElementById('submitLimitInfo');
      const limitWarning = document.getElementById('submitLimitWarning');

      if (remaining === 0) {
        limitInfo.classList.add('hidden');
        limitWarning.classList.remove('hidden');
      } else {
        limitInfo.classList.remove('hidden');
        limitWarning.classList.add('hidden');
      }
    }

    // 初始化验证码和提交限制
    generateCaptcha();
    updateRemainingCount();

    // 刷新验证码按钮
    document.getElementById('refreshCaptcha').addEventListener('click', () => {
      generateCaptcha();
      lucide.createIcons();
    });

    // ==================== 反馈表单 ====================
    const feedbackForm = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');

    feedbackForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // 验证验证码
      const captchaInput = document.getElementById('captchaInput');
      const userAnswer = parseInt(captchaInput.value);
      if (userAnswer !== captchaAnswer) {
        document.getElementById('captchaError').classList.remove('hidden');
        generateCaptcha();
        return;
      }

      const nameInput = document.getElementById('feedbackName');
      const contentInput = document.getElementById('feedbackContent');
      const name = nameInput.value.trim();
      const content = contentInput.value.trim();

      if (!content) {
        alert('请输入需求内容');
        return;
      }

      // 提交到 JSONBin.io API
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>提交中...</span>';
      lucide.createIcons();

      try {
        // 先读取现有数据
        const readResponse = await fetch(`${API_CONFIG.baseUrl}/${API_CONFIG.binId}`, {
          headers: {
            'X-Access-Key': API_CONFIG.accessKey
          }
        });

        const readData = await readResponse.json();
        const existingFeedbacks = readData.record?.feedbacks || [];

        // 创建新需求
        const newFeedback = {
          id: `req_${Date.now()}`,
          name: name || '匿名',
          content: content,
          time: new Date().toISOString(),
          status: 'pending'
        };

        // 添加到列表
        existingFeedbacks.push(newFeedback);

        // 最多保留100条
        if (existingFeedbacks.length > 100) {
          existingFeedbacks.splice(0, existingFeedbacks.length - 100);
        }

        // 更新bin
        const updateResponse = await fetch(`${API_CONFIG.baseUrl}/${API_CONFIG.binId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Access-Key': API_CONFIG.accessKey
          },
          body: JSON.stringify({
            feedbacks: existingFeedbacks
          })
        });

        if (updateResponse.ok) {
          // 发送邮件通知
          try {
            await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
              name: name || '匿名',
              content: content,
              time: new Date().toLocaleString('zh-CN')
            });
          } catch (emailError) {
            console.log('邮件发送失败:', emailError);
            // 邮件失败不影响提交结果
          }

          alert('需求已提交成功！我们会尽快处理 ❤️');
          // 清空表单
          nameInput.value = '';
          contentInput.value = '';
          generateCaptcha();
          // 刷新看板
          renderFeedbackBoard();
        } else {
          const errorData = await updateResponse.json();
          alert('提交失败，请稍后重试。\n' + (errorData.message || '未知错误'));
        }
      } catch (error) {
        alert('提交失败。\n网络错误：' + error.message);
      }

      // 恢复按钮状态
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i><span>提交需求</span>';
      lucide.createIcons();
    });

    // ==================== 初始化 ====================
    renderMosaicGrid();
    renderFeedbackBoard(); // 从JSONBin.io拉取数据
  </script>

</body>
</html>
